# External Database Values: Multi-Secret Pattern
# =================================================
# Configuration for using external managed services instead of in-cluster StatefulSets.
# Use this for production environments running:
# - AWS RDS, Azure Database, Cloud SQL for PostgreSQL
# - ElastiCache, MemoryDB, or managed Redis for Valkey
# - Meilisearch Cloud or self-hosted cluster
# - Amazon MSK, Confluent Cloud, or managed Kafka for Redpanda
#
# WHY MULTIPLE SECRETS?
# ─────────────────────
# In a typical managed-services setup, the database password is owned by a
# different system than the application secrets:
#
#   shoehorn-db-credentials   ← synced from RDS Secrets Manager via External
#                               Secrets Operator. Rotated by RDS, not by you.
#                               Holds: postgres_password, db_password.
#
#   shoehorn-app-secrets      ← managed by your platform team. Holds JWT,
#                               session keys, search/cache passwords, GitHub
#                               webhook secret, etc. Rotated on its own
#                               schedule.
#
# Each *SecretRef in this chart points at a Kubernetes Secret + key, so the
# two sources stay separate. `secret.defaultName` provides the fallback for
# every ref that doesn't override `name:`. Here we point it at the app
# secrets Secret and explicitly override `name:` only on the postgres refs.
#
# Usage:
#   helm install shoehorn ./charts/shoehorn -n shoehorn --create-namespace \
#     -f ./charts/shoehorn/examples/values-external-db.yaml
#
# IMPORTANT: Update all "CHANGE_ME" values before deploying.

global:
  # CHANGE_ME: Your domain
  domain: shoehorn.example.com

  organization:
    name: "Acme Corp"
    slug: "acme-corp"

  imagePullSecrets:
    - name: ghcr-secret

# Image configuration
image:
  registry: ghcr.io
  repository: imbabamba
  tag: "1.0.0"
  pullPolicy: IfNotPresent

# Default Secret name for everything *except* the database credentials.
secret:
  defaultName: shoehorn-app-secrets

# Mount GitHub App private key from the app-secrets Secret (for repository crawling).
extraVolumes:
  - name: github-private-key
    secret:
      secretName: shoehorn-app-secrets
      items:
        - key: github_app_private_key
          path: private-key

extraVolumeMounts:
  - name: github-private-key
    mountPath: /var/secrets/github
    readOnly: true

# Ingress
ingressRoute:
  enabled: true
  tls:
    enabled: true
    certResolver: letsencrypt

# Replica counts - 2 for redundancy and zero-downtime rolling updates
replicaCount:
  api: 2
  web: 2
  eventbus: 2
  worker: 2
  crawler: 2
  forge: 2
  cerbos: 2

# ============================================================================
# External PostgreSQL (AWS RDS, Azure Database, Cloud SQL, etc.)
# ============================================================================
# Database credentials live in their OWN Secret, synced from RDS by ESO.
# Both refs explicitly override `name:` to point away from secret.defaultName.

postgresql:
  enabled: false

  superuserPasswordSecretRef:
    name: shoehorn-db-credentials
    key: postgres_password
  passwordSecretRef:
    name: shoehorn-db-credentials
    key: db_password

  external:
    enabled: true
    # CHANGE_ME: Your external PostgreSQL host
    host: "shoehorn-db.xxxx.us-east-1.rds.amazonaws.com"
    port: 5432

# ============================================================================
# External Meilisearch (Meilisearch Cloud or self-hosted)
# ============================================================================

meilisearch:
  enabled: false

  # Master key lives in shoehorn-app-secrets (via secret.defaultName).
  masterKeySecretRef:
    key: meilisearch_master_key

  external:
    enabled: true
    # CHANGE_ME: Your Meilisearch cluster
    host: "xxxx.meilisearch.com"
    port: 443
    protocol: https

# ============================================================================
# External Valkey/Redis (ElastiCache, MemoryDB, etc.)
# ============================================================================

valkey:
  enabled: false

  passwordSecretRef:
    key: valkey_password

  external:
    enabled: true
    # CHANGE_ME: Your Redis endpoint
    host: "shoehorn-cache.xxxx.cache.amazonaws.com"
    port: 6379

# ============================================================================
# External Kafka/Redpanda (MSK, Confluent Cloud, etc.)
# ============================================================================

redpanda:
  enabled: false

  external:
    enabled: true
    # CHANGE_ME: Your Kafka brokers (comma-separated)
    brokers: "b-1.shoehorn-kafka.xxxx.kafka.us-east-1.amazonaws.com:9092,b-2.shoehorn-kafka.xxxx.kafka.us-east-1.amazonaws.com:9092"

# ============================================================================
# Cerbos (keep in-cluster - lightweight)
# ============================================================================

cerbos:
  replicas: 2
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

# ============================================================================
# Authentication
# ============================================================================
# All auth secrets live in shoehorn-app-secrets via secret.defaultName.

auth:
  provider: zitadel
  zitadel:
    # CHANGE_ME: Your Zitadel configuration (projectId/clientId are public IDs)
    projectId: "YOUR_PROJECT_ID"
    clientId: "YOUR_CLIENT_ID"
    externalUrl: "https://auth.example.com"
    insecure: false

  github:
    appId: ""              # CHANGE_ME: GitHub App ID
    installationId: ""     # CHANGE_ME: installation ID

  session:
    jwtSecretRef:
      key: jwt_secret
    encryptionKeyRef:
      key: auth_encryption_key
    secretsEncryptionKeyRef:
      key: secrets_encryption_key

# ============================================================================
# Services (API, Web, Microservices)
# ============================================================================

api:
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env:
    ENVIRONMENT: production
    LOG_LEVEL: info
    LOG_FORMAT: json
    # CHANGE_ME: GitHub integration
    GITHUB_ORGANIZATIONS: "your-org"
    TELEMETRY_ENABLED: "true"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

web:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4

forge:
  env:
    FORGE_ENVIRONMENT: "production"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ============================================================================
# Security
# ============================================================================

podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  runAsUser: 1000

podDisruptionBudget:
  enabled: true
  minAvailable: 1
