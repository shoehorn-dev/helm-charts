# Production Values with TLS Enabled
# ====================================
# Production deployment with full TLS security:
#   - mTLS for all internal gRPC services
#   - cert-manager-issued certificates
#   - HTTPS ingress with Let's Encrypt
#
# Uses secret.defaultName shortcut: every *SecretRef below only needs `key:`
# because they all resolve into the shoehorn-credentials Secret.

# Global settings
global:
  domain: shoehorn.example.com
  organization:
    name: "Your Company"
    slug: "your-company"

  # Enable mTLS for ALL gRPC services (API, Forge, Worker, Crawler, Eventbus, Cerbos)
  mtls:
    enabled: true  # PRODUCTION: Enable mutual TLS
    createCertificates: true  # Let chart create certificates via cert-manager
    issuerName: shoehorn-ca-issuer
    issuerKind: ClusterIssuer
    certFile: "/etc/shoehorn/certs/tls.crt"
    keyFile: "/etc/shoehorn/certs/tls.key"
    caFile: "/etc/shoehorn/certs/ca.crt"

# Single Secret containing all credentials.
secret:
  defaultName: shoehorn-credentials

# Authentication - Zitadel
# CHANGE_ME: Helm template will FAIL without real values for projectId
# and clientId — they are required when auth.provider is "zitadel".
auth:
  provider: zitadel
  zitadel:
    projectId: "CHANGE_ME_PROJECT_ID"   # CHANGE_ME: Zitadel project ID
    clientId: "CHANGE_ME_CLIENT_ID"     # CHANGE_ME: OIDC client ID
    externalUrl: "https://auth.example.com"  # CHANGE_ME: Zitadel external URL
    insecure: false

  github:
    appId: ""              # CHANGE_ME: GitHub App ID (public)
    installationId: ""     # CHANGE_ME: installation ID (public)
    webhookSecretRef:
      key: github_webhook_secret

  session:
    jwtSecretRef:
      key: jwt_secret
    encryptionKeyRef:
      key: auth_encryption_key
    secretsEncryptionKeyRef:
      key: secrets_encryption_key

# Cerbos Authorization
# NOTE: Cerbos TLS is controlled by global.mtls.enabled
cerbos:
  replicas: 2  # HA
  image:
    repository: ghcr.io/shoehorn-dev/shoehorn-cerbos
    tag: "latest"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1500m
      memory: 512Mi
  audit:
    enabled: true
    retentionPeriod: "720h"

# PostgreSQL with RLS (Two-User Mode)
postgresql:
  enabled: true
  replicas: 1
  superuserPasswordSecretRef:
    key: postgres_password
  passwordSecretRef:
    key: db_password
  persistence:
    enabled: true
    size: 100Gi
    storageClass: fast-ssd
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  # Audit logging
  pgaudit:
    enabled: true
    log: "write,ddl,role"

valkey:
  enabled: true
  passwordSecretRef:
    key: valkey_password

meilisearch:
  enabled: true
  masterKeySecretRef:
    key: meilisearch_master_key

# API Service
api:
  replicas: 3  # High availability
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

# Ingress with TLS
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  tls:
    - secretName: shoehorn-tls
      hosts:
        - shoehorn.example.com

# Security Context (Production hardening)
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534
  capabilities:
    drop:
      - ALL

# Resource Quotas
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
