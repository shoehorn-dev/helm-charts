{{- if and .Values.global.mtls.enabled .Values.global.mtls.createCertificates }}
---
# Shared gRPC mTLS Certificate for all internal services
# This certificate is used by API, Forge, Worker, Crawler, Eventbus, and Cerbos
# All services share the same certificate for simplified management
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "shoehorn.fullname" . }}-grpc-mtls
  namespace: {{ include "shoehorn.namespace.backend" . }}
  labels:
    {{- include "shoehorn.labels" . | nindent 4 }}
    app.kubernetes.io/component: grpc-mtls
spec:
  # Secret name where cert-manager will store the certificate
  # All services mount this same secret
  secretName: {{ include "shoehorn.fullname" . }}-grpc-mtls-cert

  # Certificate validity period
  duration: 2160h  # 90 days
  renewBefore: 360h  # Renew 15 days before expiry

  # Subject details
  subject:
    organizations:
      - {{ .Values.global.organization.name | default "Shoehorn" }}

  # Common Name
  commonName: "*.{{ include "shoehorn.namespace.backend" . }}.svc.cluster.local"

  # DNS names (wildcard for all services in namespace)
  dnsNames:
    # Wildcard for all services
    - "*.{{ include "shoehorn.namespace.backend" . }}.svc.cluster.local"
    - "*.{{ include "shoehorn.namespace.backend" . }}.svc"
    - "*.{{ include "shoehorn.namespace.backend" . }}"
    # Specific service names
    - {{ include "shoehorn.fullname" . }}-api
    - {{ include "shoehorn.fullname" . }}-api.{{ include "shoehorn.namespace.backend" . }}.svc.cluster.local
    - {{ include "shoehorn.fullname" . }}-forge
    - {{ include "shoehorn.fullname" . }}-forge.{{ include "shoehorn.namespace.backend" . }}.svc.cluster.local
    - {{ include "shoehorn.fullname" . }}-worker
    - {{ include "shoehorn.fullname" . }}-worker.{{ include "shoehorn.namespace.backend" . }}.svc.cluster.local
    - {{ include "shoehorn.fullname" . }}-crawler
    - {{ include "shoehorn.fullname" . }}-crawler.{{ include "shoehorn.namespace.backend" . }}.svc.cluster.local
    - {{ include "shoehorn.fullname" . }}-eventbus
    - {{ include "shoehorn.fullname" . }}-eventbus.{{ include "shoehorn.namespace.backend" . }}.svc.cluster.local
    - {{ include "shoehorn.fullname" . }}-cerbos
    - {{ include "shoehorn.fullname" . }}-cerbos.{{ include "shoehorn.namespace.backend" . }}.svc.cluster.local

  # Issuer reference
  issuerRef:
    name: {{ .Values.global.mtls.issuerName | default "shoehorn-ca-issuer" }}
    kind: {{ .Values.global.mtls.issuerKind | default "ClusterIssuer" }}
    group: cert-manager.io

  # Key settings
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048

  # Certificate usage (both server and client for mTLS)
  usages:
    - server auth
    - client auth
{{- end }}
