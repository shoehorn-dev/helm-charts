{{- include "shoehorn.validateValues" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shoehorn.fullname" . }}-api
  namespace: {{ include "shoehorn.namespace.backend" . }}
  labels:
    {{- include "shoehorn.api.labels" . | nindent 4 }}
  annotations:
    {{- include "shoehorn.serviceAnnotations" .Values.api.annotations | nindent 4 }}
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount.api }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "shoehorn.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-backend.yaml") . | sha256sum }}
        {{- include "shoehorn.serviceAnnotations" .Values.api.annotations | nindent 8 }}
      labels:
        {{- include "shoehorn.api.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "shoehorn.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "shoehorn.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
      # Wait for infrastructure services to be ready
      - name: wait-for-postgresql
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z {{ include "shoehorn.postgresql.host" . }} {{ include "shoehorn.postgresql.port" . }}; do echo waiting for postgresql; sleep 2; done;']
      - name: wait-for-meilisearch
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z {{ include "shoehorn.meilisearch.host" . }} {{ include "shoehorn.meilisearch.port" . }}; do echo waiting for meilisearch; sleep 2; done;']
      - name: wait-for-redpanda
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z {{ include "shoehorn.redpanda.host" . }} {{ include "shoehorn.redpanda.port" . }}; do echo waiting for redpanda; sleep 2; done;']
      # Run database migrations before starting the API
      # Uses shoehorn_user (BYPASSRLS) to apply schema changes and create app_user
      - name: migrate
        image: {{ include "shoehorn.componentImage" (dict "component" .Values.api "Values" .Values) }}
        command: ["/api", "--migrate-only"]
        env:
        {{- include "shoehorn.secretRef" (dict "env" "POSTGRES_PASSWORD" "root" .) | nindent 8 }}
        - name: MIGRATION_DATABASE_URL
          {{- if .Values.postgresql.tls.enabled }}
          value: "postgresql://shoehorn_user:$(POSTGRES_PASSWORD)@{{ include "shoehorn.postgresql.host" . }}:5432/shoehorn?sslmode={{ .Values.postgresql.tls.sslMode | default "require" }}"
          {{- else }}
          value: "postgresql://shoehorn_user:$(POSTGRES_PASSWORD)@{{ include "shoehorn.postgresql.host" . }}:5432/shoehorn?sslmode=disable"
          {{- end }}
        - name: APP_USER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secret.existingSecret }}
              key: {{ .Values.secret.mappings.DB_PASSWORD }}
        - name: ENVIRONMENT
          value: {{ .Values.global.environment | quote }}
        - name: LOG_LEVEL
          value: "info"
      containers:
      - name: api
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: {{ include "shoehorn.componentImage" (dict "component" .Values.api "Values" .Values) }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        envFrom:
        - configMapRef:
            name: {{ include "shoehorn.fullname" . }}-backend
        env:
        # Service-specific configuration
        - name: SERVICE_NAME
          value: "api"
        - name: HTTP_PORT
          value: {{ .Values.api.env.HTTP_PORT | quote }}

        # Database configuration (secrets and dynamic values)
        # IMPORTANT: DB_PASSWORD must be defined BEFORE DATABASE_URL for $(DB_PASSWORD) substitution to work
        {{- include "shoehorn.secretRef" (dict "env" "DB_PASSWORD" "root" .) | nindent 8 }}
        - name: DATABASE_URL
          {{- if .Values.postgresql.tls.enabled }}
          value: "postgresql://app_user:$(DB_PASSWORD)@{{ include "shoehorn.postgresql.host" . }}:5432/shoehorn?sslmode={{ .Values.postgresql.tls.sslMode | default "require" }}"
          {{- else }}
          value: "postgresql://app_user:$(DB_PASSWORD)@{{ include "shoehorn.postgresql.host" . }}:5432/shoehorn?sslmode=disable"
          {{- end }}
        # App user password for RLS migration init container
        - name: APP_USER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secret.existingSecret }}
              key: {{ .Values.secret.mappings.DB_PASSWORD }}
        # Dynamic database host (from Helm helper)
        - name: DB_HOST
          value: {{ include "shoehorn.postgresql.host" . }}

        # Cerbos Authorization
        - name: CERBOS_ENABLED
          value: "true"
        - name: CERBOS_URL
          value: "{{ include "shoehorn.fullname" . }}-cerbos:3593"
        - name: CERBOS_TLS_ENABLED
          value: {{ .Values.global.mtls.enabled | quote }}

        # Distributed Tracing (OpenTelemetry)
        - name: TRACING_ENABLED
          value: {{ .Values.global.tracing.enabled | default false | quote }}
        {{- if .Values.global.tracing.otlpEndpoint }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ .Values.global.tracing.otlpEndpoint | quote }}
        {{- end }}

        # gRPC mTLS Configuration
        - name: GRPC_TLS_ENABLED
          value: {{ .Values.global.mtls.enabled | default false | quote }}
        {{- if .Values.global.mtls.enabled }}
        - name: GRPC_TLS_CERT_FILE
          value: {{ .Values.global.mtls.certFile | quote }}
        - name: GRPC_TLS_KEY_FILE
          value: {{ .Values.global.mtls.keyFile | quote }}
        - name: GRPC_TLS_CA_FILE
          value: {{ .Values.global.mtls.caFile | quote }}
        {{- end }}

        # Valkey/Redis
        - name: VALKEY_ADDR
          value: "{{ include "shoehorn.valkey.host" . }}:{{ include "shoehorn.valkey.port" . }}"
        {{- include "shoehorn.secretRef" (dict "env" "VALKEY_PASSWORD" "root" .) | nindent 8 }}

        # Meilisearch
        {{- include "shoehorn.secretRef" (dict "env" "MEILISEARCH_MASTER_KEY" "root" .) | nindent 8 }}

        # Authentication Provider Configuration
        - name: AUTH_PROVIDER
          value: {{ .Values.auth.provider | quote }}

        # Role Assignment (IdP-agnostic tenant role auto-assignment)
        # Bootstrap admin gets tenant:admin role on first login (if no roles in database)
        {{- if .Values.rbac.roleAssignment }}
        {{- if .Values.rbac.roleAssignment.tenantAdmin }}
        {{- if .Values.rbac.roleAssignment.tenantAdmin.user }}
        - name: TENANT_ADMIN_USER
          value: {{ .Values.rbac.roleAssignment.tenantAdmin.user | quote }}
        {{- end }}
        {{- if .Values.rbac.roleAssignment.tenantAdmin.group }}
        - name: TENANT_ADMIN_GROUP
          value: {{ .Values.rbac.roleAssignment.tenantAdmin.group | quote }}
        {{- end }}
        {{- end }}
        {{- end }}

        {{- if eq .Values.auth.provider "zitadel" }}
        # Zitadel Provider
        - name: ZITADEL_URL
          value: {{ .Values.auth.zitadel.externalUrl | quote }}
        {{- if hasKey .Values.secret.mappings "ZITADEL_PROJECT_ID" }}
        {{- include "shoehorn.secretRef" (dict "env" "ZITADEL_PROJECT_ID" "root" .) | nindent 8 }}
        {{- else }}
        - name: ZITADEL_PROJECT_ID
          value: {{ .Values.auth.zitadel.projectId | quote }}
        {{- end }}
        {{- if hasKey .Values.secret.mappings "ZITADEL_CLIENT_ID" }}
        {{- include "shoehorn.secretRef" (dict "env" "ZITADEL_CLIENT_ID" "root" .) | nindent 8 }}
        {{- else }}
        - name: ZITADEL_CLIENT_ID
          value: {{ .Values.auth.zitadel.clientId | quote }}
        {{- end }}
        - name: ZITADEL_INSECURE
          value: {{ .Values.auth.zitadel.insecure | default false | quote }}
        - name: APP_DOMAIN
          value: {{ .Values.global.domain | quote }}
        - name: APP_SCHEME
          value: "https"
        {{- include "shoehorn.secretRef" (dict "env" "ZITADEL_SERVICE_USER_PAT" "root" .) | nindent 8 }}
        {{- end }}
        {{- include "shoehorn.secretRef" (dict "env" "SESSION_ENCRYPTION_KEY" "root" .) | nindent 8 }}

        # Multi-Provider OrgData Sync
        {{- if .Values.auth.orgdata.enabled }}
        {{- if .Values.auth.orgdata.providers }}
        - name: ORGDATA_PROVIDERS
          value: {{ join "," .Values.auth.orgdata.providers | quote }}
        {{- end }}
        {{- if .Values.auth.orgdata.primaryProvider }}
        - name: PRIMARY_ORGDATA_PROVIDER
          value: {{ .Values.auth.orgdata.primaryProvider | quote }}
        {{- end }}
        {{- include "shoehorn.secretRef" (dict "env" "OKTA_API_TOKEN" "root" .) | nindent 8 }}
        {{- end }}

        {{- if eq .Values.auth.provider "okta" }}
        # Okta Provider
        - name: OKTA_DOMAIN
          value: {{ .Values.auth.okta.domain | quote }}
        - name: OKTA_CLIENT_ID
          value: {{ .Values.auth.okta.clientId | quote }}
        {{- include "shoehorn.secretRef" (dict "env" "OKTA_CLIENT_SECRET" "root" .) | nindent 8 }}
        {{- if .Values.auth.okta.issuer }}
        - name: OKTA_ISSUER
          value: {{ .Values.auth.okta.issuer | quote }}
        {{- end }}
        {{- end }}

        {{- if eq .Values.auth.provider "entra-id" }}
        # Microsoft Entra ID Provider
        - name: ENTRA_TENANT_ID
          value: {{ .Values.auth.entraId.tenantId | quote }}
        - name: ENTRA_CLIENT_ID
          value: {{ .Values.auth.entraId.clientId | quote }}
        {{- include "shoehorn.secretRef" (dict "env" "ENTRA_CLIENT_SECRET" "root" .) | nindent 8 }}
        {{- if .Values.auth.entraId.authority }}
        - name: ENTRA_AUTHORITY
          value: {{ .Values.auth.entraId.authority | quote }}
        {{- end }}
        {{- end }}

        # GitHub Integration
        {{- include "shoehorn.secretRef" (dict "env" "GITHUB_APP_ID" "root" .) | nindent 8 }}
        {{- include "shoehorn.secretRef" (dict "env" "GITHUB_APP_INSTALLATION_ID" "root" .) | nindent 8 }}
        {{- if hasKey .Values.secret.mappings "GITHUB_APP_INSTALLATION_ID" }}
        - name: GITHUB_INSTALLATION_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secret.existingSecret }}
              key: {{ index .Values.secret.mappings "GITHUB_APP_INSTALLATION_ID" }}
        {{- end }}
        {{- include "shoehorn.secretRef" (dict "env" "GITHUB_WEBHOOK_SECRET" "root" .) | nindent 8 }}
        - name: GITHUB_APP_PRIVATE_KEY_PATH
          value: /var/secrets/github/private-key

        # GitHub Forge Integration (for workflow execution)
        {{- include "shoehorn.secretRef" (dict "env" "GITHUB_FORGE_APP_ID" "root" . "optional" true) | nindent 8 }}
        {{- include "shoehorn.secretRef" (dict "env" "GITHUB_FORGE_INSTALLATION_ID" "root" . "optional" true) | nindent 8 }}
        - name: GITHUB_FORGE_PRIVATE_KEY_PATH
          value: /var/secrets/github-forge/private-key

        # ArgoCD API token (for direct sync/refresh calls)
        {{- include "shoehorn.secretRef" (dict "env" "ARGOCD_TOKEN" "root" . "optional" true) | nindent 8 }}

        # JWT
        {{- include "shoehorn.secretRef" (dict "env" "JWT_SECRET" "root" .) | nindent 8 }}

        # Auth Provider Encryption
        {{- include "shoehorn.secretRef" (dict "env" "AUTH_ENCRYPTION_KEY" "root" .) | nindent 8 }}

        # SMTP
        {{- if .Values.smtp.enabled }}
        {{- include "shoehorn.secretRef" (dict "env" "SMTP_PASSWORD" "root" .) | nindent 8 }}
        {{- end }}

        volumeMounts:
        {{- include "shoehorn.extraVolumeMounts" . | nindent 8 }}
        {{- include "shoehorn.grpcMtlsVolumeMounts" . | nindent 8 }}

        livenessProbe:
          {{- toYaml .Values.api.livenessProbe | nindent 12 }}
        readinessProbe:
          {{- toYaml .Values.api.readinessProbe | nindent 12 }}
        resources:
          {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
      {{- include "shoehorn.extraVolumes" . | nindent 6 }}
      {{- include "shoehorn.grpcMtlsVolumes" . | nindent 6 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
