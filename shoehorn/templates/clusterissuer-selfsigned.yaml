{{- /*
  Three-step CA setup for internal TLS (gRPC, PostgreSQL, Redpanda, Meilisearch):
  bootstrap self-signed issuer → CA Certificate → CA issuer that signs service certs.
  Set certManager.createClusterIssuer: false to use an existing issuer instead.
*/ -}}
{{- $tlsEnabled := or .Values.global.mtls.enabled .Values.postgresql.tls.enabled .Values.redpanda.tls.enabled .Values.meilisearch.tls.enabled -}}
{{- if and $tlsEnabled .Values.certManager.createClusterIssuer }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Release.Name }}-selfsigned-issuer
  labels:
    {{- include "shoehorn.labels" . | nindent 4 }}
    app.kubernetes.io/component: certificate-authority
spec:
  selfSigned: {}

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-ca
  namespace: {{ include "shoehorn.namespace.backend" . }}
  labels:
    {{- include "shoehorn.labels" . | nindent 4 }}
    app.kubernetes.io/component: certificate-authority
spec:
  secretName: {{ .Release.Name }}-ca-secret
  isCA: true
  commonName: {{ .Values.certManager.issuer.ca.organizationName | default "Shoehorn Platform" }} Root CA
  subject:
    organizations:
      - {{ .Values.certManager.issuer.ca.organizationName | default "Shoehorn Platform" }}
  duration: {{ .Values.certManager.issuer.ca.duration | default "87600h" }}
  renewBefore: {{ .Values.certManager.issuer.ca.renewBefore | default "8760h" }}
  issuerRef:
    name: {{ .Release.Name }}-selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
  privateKey:
    algorithm: RSA
    size: 4096

---
apiVersion: cert-manager.io/v1
kind: {{ .Values.certManager.issuer.kind | default "ClusterIssuer" }}
metadata:
  name: {{ .Values.certManager.issuer.name | default "shoehorn-ca-issuer" }}
  {{- if eq (.Values.certManager.issuer.kind | default "ClusterIssuer") "Issuer" }}
  namespace: {{ include "shoehorn.namespace.backend" . }}
  {{- end }}
  labels:
    {{- include "shoehorn.labels" . | nindent 4 }}
    app.kubernetes.io/component: certificate-authority
spec:
  ca:
    secretName: {{ .Release.Name }}-ca-secret
{{- end }}
