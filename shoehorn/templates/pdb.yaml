{{- if .Values.podDisruptionBudget.enabled }}
{{/* PDBs only render when the component has 2+ replicas (or autoscaling enabled).
     With a single replica, minAvailable: 1 would make node drains hang forever. */}}
{{- if or (ge (int .Values.replicaCount.api) 2) .Values.api.autoscaling.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "shoehorn.fullname" . }}-api
  namespace: {{ include "shoehorn.namespace.backend" . }}
  labels:
    {{- include "shoehorn.api.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "shoehorn.api.selectorLabels" . | nindent 6 }}
{{- end }}
