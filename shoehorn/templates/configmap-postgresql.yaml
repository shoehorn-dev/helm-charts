{{- if and .Values.postgresql.enabled (not .Values.postgresql.external.enabled) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "shoehorn.fullname" . }}-postgresql-config
  namespace: {{ include "shoehorn.namespace.data" . }}
  labels:
    {{- include "shoehorn.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
data:
  custom.conf: |
    # Network configuration
    listen_addresses = '*'

    {{- if .Values.postgresql.tls.enabled }}
    # TLS/SSL Configuration
    ssl = on
    ssl_cert_file = '{{ .Values.postgresql.tls.certFile }}'
    ssl_key_file = '{{ .Values.postgresql.tls.keyFile }}'
    ssl_ca_file = '{{ .Values.postgresql.tls.caFile }}'
    ssl_min_protocol_version = 'TLSv1.2'
    ssl_ciphers = 'HIGH:!aNULL:!MD5'
    ssl_prefer_server_ciphers = on
    {{- else }}
    # TLS/SSL Disabled (cluster-internal plaintext)
    ssl = off
    {{- end }}

    # pgaudit - PostgreSQL Audit Extension
    # ALWAYS preload pgaudit (installed in Docker image) to support migrations
    # Audit logging is only active when pgaudit.enabled=true
    shared_preload_libraries = 'pgaudit'

    {{- if .Values.postgresql.pgaudit.enabled }}
    # Audit logging configuration (ENABLED)
    # log=write: Log INSERT, UPDATE, DELETE operations
    # log=ddl: Log CREATE, ALTER, DROP statements
    # log=role: Log GRANT, REVOKE, role assignments
    pgaudit.log = '{{ .Values.postgresql.pgaudit.log }}'

    # Exclude catalog queries (reduces log noise)
    pgaudit.log_catalog = {{ .Values.postgresql.pgaudit.logCatalog }}

    # Include relation names in audit logs
    pgaudit.log_relation = {{ .Values.postgresql.pgaudit.logRelation }}

    # Include statement parameters in audit logs
    pgaudit.log_parameter = {{ .Values.postgresql.pgaudit.logParameter }}

    # Enhanced log line prefix for audit trail
    # %m = timestamp, %p = PID, %d = database, %u = user, %a = application
    log_line_prefix = '%m [%p] [%d] [%u] [%a] '
    {{- else }}
    # Audit logging configuration (DISABLED)
    # pgaudit is preloaded but not actively logging
    # To enable: set postgresql.pgaudit.enabled=true in values.yaml
    pgaudit.log = 'none'
    {{- end }}
{{- end }}
