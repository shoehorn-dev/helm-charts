{{- if .Values.ingressRoute.enabled }}
---
# Middleware for HTTP to HTTPS redirect
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "shoehorn.fullname" . }}-redirect-https
  namespace: {{ include "shoehorn.namespace.frontend" . }}
  labels:
    {{- include "shoehorn.labels" . | nindent 4 }}
spec:
  redirectScheme:
    scheme: https
    permanent: true

---
# Middleware for setting X-Forwarded headers (required for OAuth/OIDC)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "shoehorn.fullname" . }}-headers
  namespace: {{ include "shoehorn.namespace.frontend" . }}
  labels:
    {{- include "shoehorn.labels" . | nindent 4 }}
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
      X-Forwarded-Host: "{{ .Values.global.domain }}"

---
# HTTP to HTTPS Redirect IngressRoute
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "shoehorn.fullname" . }}-http-redirect
  namespace: {{ include "shoehorn.namespace.frontend" . }}
  labels:
    {{- include "shoehorn.labels" . | nindent 4 }}
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.global.domain }}`)
      kind: Rule
      middlewares:
        - name: {{ include "shoehorn.fullname" . }}-redirect-https
      services:
        - name: noop@internal
          kind: TraefikService

---
# Main HTTPS IngressRoute for Shoehorn
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "shoehorn.fullname" . }}
  namespace: {{ include "shoehorn.namespace.frontend" . }}
  labels:
    {{- include "shoehorn.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    # API routes - higher priority to ensure /api/v1 is matched before catch-all
    - match: Host(`{{ .Values.global.domain }}`) && PathPrefix(`/api/v1`)
      kind: Rule
      priority: 100
      middlewares:
        - name: {{ include "shoehorn.fullname" . }}-headers
      services:
        - name: {{ include "shoehorn.fullname" . }}-api
          namespace: {{ include "shoehorn.namespace.backend" . }}
          port: 8080
          passHostHeader: true

    # Web frontend - serves the SvelteKit application (lower priority catch-all)
    - match: Host(`{{ .Values.global.domain }}`)
      kind: Rule
      priority: 10
      services:
        - name: {{ include "shoehorn.fullname" . }}-web
          namespace: {{ include "shoehorn.namespace.frontend" . }}
          port: 4173
          passHostHeader: true

  {{- if .Values.ingressRoute.tls.enabled }}
  tls:
    certResolver: {{ .Values.ingressRoute.tls.certResolver | default "letsencrypt" }}
    domains:
      - main: {{ .Values.global.domain }}
  {{- end }}

{{- end }}
