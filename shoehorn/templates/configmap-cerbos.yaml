---
# Cerbos server configuration
# Policies are baked into the shoehorn-cerbos image (see docker/Dockerfile.cerbos)
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "shoehorn.fullname" . }}-cerbos-config
  namespace: {{ include "shoehorn.namespace.backend" . }}
  labels:
    {{- include "shoehorn.labels" . | nindent 4 }}
    app.kubernetes.io/component: cerbos
data:
  config.yaml: |
    server:
      httpListenAddr: ":3592"
      grpcListenAddr: ":3593"
      {{- if .Values.global.mtls.enabled }}
      # mTLS — cert/key for server identity, caCert triggers client cert verification.
      tls:
        cert: {{ .Values.global.mtls.certFile }}
        key: {{ .Values.global.mtls.keyFile }}
        caCert: {{ .Values.global.mtls.caFile }}
      {{- end }}

    storage:
      driver: disk
      disk:
        directory: /policies
        watchForChanges: false

    audit:
      enabled: {{ .Values.cerbos.audit.enabled }}
      backend: local
      local:
        storagePath: /tmp/cerbos-audit
        retentionPeriod: {{ .Values.cerbos.audit.retentionPeriod | default "168h" }}

    engine:
      defaultPolicyVersion: "default"
