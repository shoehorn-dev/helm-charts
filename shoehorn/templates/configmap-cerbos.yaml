---
# Cerbos server configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "shoehorn.fullname" . }}-cerbos-config
  namespace: {{ include "shoehorn.namespace.backend" . }}
  labels:
    {{- include "shoehorn.labels" . | nindent 4 }}
    app.kubernetes.io/component: cerbos
data:
  config.yaml: |
    # Cerbos Server Configuration
    server:
      httpListenAddr: ":3592"
      grpcListenAddr: ":3593"
      {{- if .Values.global.mtls.enabled }}
      # TLS Configuration (uses shared gRPC mTLS certificate)
      tls:
        cert: {{ .Values.global.mtls.certFile }}
        key: {{ .Values.global.mtls.keyFile }}
      {{- end }}

    storage:
      driver: disk
      disk:
        directory: /policies
        watchForChanges: true

    audit:
      enabled: {{ .Values.cerbos.audit.enabled }}
      backend: local
      local:
        storagePath: /tmp/cerbos-audit
        retentionPeriod: {{ .Values.cerbos.audit.retentionPeriod | default "168h" }}

    engine:
      defaultPolicyVersion: "default"
---
# Cerbos policy files
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "shoehorn.fullname" . }}-cerbos-policies
  namespace: {{ include "shoehorn.namespace.backend" . }}
  labels:
    {{- include "shoehorn.labels" . | nindent 4 }}
    app.kubernetes.io/component: cerbos
data:
  # Derived roles - role hierarchy definitions
  derived_roles.yaml: |
    # Shoehorn Role Definitions
    # User Roles (assigned in database):
    #   tenant:admin        - Full admin access to everything in tenant
    #   tenant:viewer       - Read access to entities, workflows, molds, operations (no admin)
    #   entity:viewer       - Read/list entities
    #   entity:editor       - Create/update entities
    #   entity:admin        - Delete entities
    #   workflow:viewer     - Read/list workflows
    #   workflow:executor   - Create/cancel/retry workflows
    #   workflow:admin      - Delete workflows
    #   mold:viewer         - Read/list molds
    #   mold:editor         - Create/update molds
    #   mold:publisher      - Publish molds
    #   mold:admin          - Delete molds
    #   operations:viewer   - View workloads, deployments, services
    #   operations:operator - Update operations resources (scale, restart, etc.)
    #   operations:admin    - Delete operations resources
    #   admin:viewer        - View audit logs
    #   admin:operator      - Manage users, integrations

    apiVersion: api.cerbos.dev/v1
    derivedRoles:
      name: shoehorn_roles
      definitions:
        # ENTITY DERIVED ROLES
        - name: entity_viewer
          parentRoles:
            - "entity:viewer"
            - "entity:editor"
            - "entity:admin"
            - "tenant:viewer"
            - "tenant:admin"
          condition:
            match:
              expr: request.principal.id != ""

        - name: entity_editor
          parentRoles:
            - "entity:editor"
            - "entity:admin"
            - "tenant:admin"
          condition:
            match:
              expr: request.principal.id != ""

        - name: entity_admin
          parentRoles:
            - "entity:admin"
            - "tenant:admin"
          condition:
            match:
              expr: request.principal.id != ""

        # WORKFLOW DERIVED ROLES
        - name: workflow_viewer
          parentRoles:
            - "workflow:viewer"
            - "workflow:executor"
            - "workflow:admin"
            - "tenant:viewer"
            - "tenant:admin"
          condition:
            match:
              expr: request.principal.id != ""

        - name: workflow_executor
          parentRoles:
            - "workflow:executor"
            - "workflow:admin"
            - "tenant:admin"
          condition:
            match:
              expr: request.principal.id != ""

        - name: workflow_admin
          parentRoles:
            - "workflow:admin"
            - "tenant:admin"
          condition:
            match:
              expr: request.principal.id != ""

        # MOLD DERIVED ROLES
        - name: mold_viewer
          parentRoles:
            - "mold:viewer"
            - "mold:editor"
            - "mold:publisher"
            - "mold:admin"
            - "tenant:viewer"
            - "tenant:admin"
          condition:
            match:
              expr: request.principal.id != ""

        - name: mold_editor
          parentRoles:
            - "mold:editor"
            - "mold:admin"
            - "tenant:admin"
          condition:
            match:
              expr: request.principal.id != ""

        - name: mold_publisher
          parentRoles:
            - "mold:publisher"
            - "mold:admin"
            - "tenant:admin"
          condition:
            match:
              expr: request.principal.id != ""

        - name: mold_admin
          parentRoles:
            - "mold:admin"
            - "tenant:admin"
          condition:
            match:
              expr: request.principal.id != ""

        # OPERATIONS DERIVED ROLES
        - name: operations_viewer
          parentRoles:
            - "operations:viewer"
            - "operations:operator"
            - "operations:admin"
            - "tenant:viewer"
            - "tenant:admin"
          condition:
            match:
              expr: request.principal.id != ""

        - name: operations_operator
          parentRoles:
            - "operations:operator"
            - "operations:admin"
            - "tenant:admin"
          condition:
            match:
              expr: request.principal.id != ""

        - name: operations_admin
          parentRoles:
            - "operations:admin"
            - "tenant:admin"
          condition:
            match:
              expr: request.principal.id != ""

        # ADMIN DERIVED ROLES
        - name: admin_viewer
          parentRoles:
            - "admin:viewer"
            - "admin:operator"
            - "tenant:admin"
          condition:
            match:
              expr: request.principal.id != ""

        - name: admin_operator
          parentRoles:
            - "admin:operator"
            - "tenant:admin"
          condition:
            match:
              expr: request.principal.id != ""

        # MARKETPLACE DERIVED ROLES
        - name: marketplace_viewer
          parentRoles:
            - "marketplace:viewer"
            - "marketplace:editor"
            - "tenant:viewer"
            - "tenant:admin"
          condition:
            match:
              expr: request.principal.id != ""

        - name: marketplace_editor
          parentRoles:
            - "marketplace:editor"
            - "marketplace:admin"
            - "tenant:admin"
          condition:
            match:
              expr: request.principal.id != ""

        - name: marketplace_admin
          parentRoles:
            - "marketplace:admin"
            - "tenant:admin"
          condition:
            match:
              expr: request.principal.id != ""

        # TEAM DERIVED ROLES
        - name: team_viewer
          parentRoles:
            - "entity:viewer"
            - "entity:editor"
            - "entity:admin"
            - "admin:viewer"
            - "admin:operator"
            - "tenant:viewer"
            - "tenant:admin"
          condition:
            match:
              expr: request.principal.id != ""

        - name: team_editor
          parentRoles:
            - "entity:viewer"
            - "entity:editor"
            - "entity:admin"
            - "admin:operator"
            - "tenant:admin"
          condition:
            match:
              expr: request.principal.id != ""

  # Entity resource policy
  entity.yaml: |
    apiVersion: api.cerbos.dev/v1
    resourcePolicy:
      version: "default"
      resource: "entity"
      importDerivedRoles:
        - shoehorn_roles
      rules:
        - actions: ["read", "list"]
          effect: EFFECT_ALLOW
          derivedRoles: ["entity_viewer"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

        - actions: ["create", "update"]
          effect: EFFECT_ALLOW
          derivedRoles: ["entity_editor"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

        - actions: ["delete"]
          effect: EFFECT_ALLOW
          derivedRoles: ["entity_admin"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

  # Workflow resource policy
  workflow.yaml: |
    apiVersion: api.cerbos.dev/v1
    resourcePolicy:
      version: "default"
      resource: "workflow"
      importDerivedRoles:
        - shoehorn_roles
      rules:
        - actions: ["read", "list"]
          effect: EFFECT_ALLOW
          derivedRoles: ["workflow_viewer"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

        - actions: ["create", "execute", "write"]
          effect: EFFECT_ALLOW
          derivedRoles: ["workflow_executor"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

        - actions: ["cancel", "retry"]
          effect: EFFECT_ALLOW
          derivedRoles: ["workflow_executor"]
          condition:
            match:
              all:
                of:
                  - expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id
                  - expr: request.resource.attr.created_by == request.principal.id

        - actions: ["cancel", "retry"]
          effect: EFFECT_ALLOW
          derivedRoles: ["workflow_admin"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

        - actions: ["create", "execute", "write"]
          effect: EFFECT_ALLOW
          derivedRoles: ["workflow_admin"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

        - actions: ["delete"]
          effect: EFFECT_ALLOW
          derivedRoles: ["workflow_admin"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

  # Mold resource policy
  mold.yaml: |
    apiVersion: api.cerbos.dev/v1
    resourcePolicy:
      version: "default"
      resource: "mold"
      importDerivedRoles:
        - shoehorn_roles
      rules:
        - actions: ["read", "list"]
          effect: EFFECT_ALLOW
          derivedRoles: ["mold_viewer"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

        - actions: ["create", "update", "write"]
          effect: EFFECT_ALLOW
          derivedRoles: ["mold_editor"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

        - actions: ["publish"]
          effect: EFFECT_ALLOW
          derivedRoles: ["mold_publisher"]
          condition:
            match:
              all:
                of:
                  - expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id
                  - expr: request.resource.attr.author_id == request.principal.id

        - actions: ["publish"]
          effect: EFFECT_ALLOW
          derivedRoles: ["mold_admin"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

        - actions: ["create", "update", "write"]
          effect: EFFECT_ALLOW
          derivedRoles: ["mold_admin"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

        - actions: ["delete"]
          effect: EFFECT_ALLOW
          derivedRoles: ["mold_admin"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

  # Admin resource policy
  # Covers all admin-level operations: integrations, k8s agents, analytics,
  # indexing, system, database, policies, roles, auth-providers
  #
  # Actions (CRUD pattern matching entity/mold/workflow policies):
  #   read   - GET single resource or list
  #   create - POST new resource
  #   update - PUT/PATCH existing resource
  #   delete - DELETE resource
  #
  # Permission Matrix:
  #   admin_viewer:   read (view admin pages, analytics, audit logs)
  #   admin_operator: read, create, update, delete (full admin management)
  admin.yaml: |
    apiVersion: api.cerbos.dev/v1
    resourcePolicy:
      version: "default"
      resource: "admin"
      importDerivedRoles:
        - shoehorn_roles
      rules:
        # Viewers can read admin resources (dashboards, analytics, audit logs)
        - actions: ["read", "access", "view_audit_log"]
          effect: EFFECT_ALLOW
          derivedRoles: ["admin_viewer"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

        # Operators can manage admin resources
        - actions: ["create", "update", "delete", "write", "manage_users", "manage_integrations", "manage_tenant"]
          effect: EFFECT_ALLOW
          derivedRoles: ["admin_operator"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

  # Feature Flags Resource Policy
  # Governs admin operations on feature flags and tenant overrides
  #
  # Actions:
  #   read   - list flags, get overrides
  #   create - create a flag
  #   update - update a flag
  #   delete - delete a flag
  #   manage_override - set/remove tenant overrides
  #
  # Roles:
  #   admin_viewer   -> read
  #   admin_operator -> read/create/update/delete/manage_override
  feature.yaml: |
    apiVersion: api.cerbos.dev/v1
    resourcePolicy:
      version: "default"
      resource: "feature"
      importDerivedRoles:
        - shoehorn_roles
      rules:
        - actions: ["read"]
          effect: EFFECT_ALLOW
          derivedRoles: ["admin_viewer"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

        - actions: ["create", "update", "delete", "manage_override"]
          effect: EFFECT_ALLOW
          derivedRoles: ["admin_operator"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

  # Operations Resource Policy
  # Operations resources include workloads, deployments, services, and other operational data
  # from Kubernetes clusters and infrastructure
  #
  # Actions:
  #   read   - GET workloads or list operations resources
  #   list   - List operations resources
  #   update - POST/PUT update operations resources (scale, restart, etc.)
  #   delete - DELETE operations resource
  #
  # Permission Matrix:
  #   operations_viewer:   read, list
  #   operations_operator: read, list, update
  #   operations_admin:    read, list, update, delete
  operations.yaml: |
    apiVersion: api.cerbos.dev/v1
    resourcePolicy:
      version: "default"
      resource: "operations"
      importDerivedRoles:
        - shoehorn_roles
      rules:
        # Viewers can read/list operations resources
        - actions: ["read", "list"]
          effect: EFFECT_ALLOW
          derivedRoles: ["operations_viewer"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

        # Operators can update operations resources (scale, restart, etc.)
        - actions: ["update"]
          effect: EFFECT_ALLOW
          derivedRoles: ["operations_operator"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

        # Admins can delete operations resources
        - actions: ["delete"]
          effect: EFFECT_ALLOW
          derivedRoles: ["operations_admin"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

  # K8s Agent Resource Policy
  # Covers K8s cluster agent registration, management, and workload ingestion
  #
  # Actions (CRUD pattern matching entity/mold/workflow policies):
  #   read   - GET agent details or list agents
  #   create - POST register new agent
  #   update - POST rotate token, update agent config
  #   delete - DELETE agent, POST revoke agent
  #
  # Permission Matrix:
  #   admin_viewer:   read (view registered agents, status)
  #   admin_operator: read, create, update, delete (full agent management)
  #
  # Note: Workload push (/api/v1/k8s/agents/push) uses agent token auth,
  #       not user session auth, so it bypasses Cerbos RBAC.
  k8s_agent.yaml: |
    apiVersion: api.cerbos.dev/v1
    resourcePolicy:
      version: "default"
      resource: "k8s_agent"
      importDerivedRoles:
        - shoehorn_roles
      rules:
        # Viewers can read K8s agents (list, view details, status)
        - actions: ["read"]
          effect: EFFECT_ALLOW
          derivedRoles: ["admin_viewer"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

        # Operators can fully manage K8s agents
        - actions: ["create", "update", "delete"]
          effect: EFFECT_ALLOW
          derivedRoles: ["admin_operator"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

  # Marketplace Resource Policy
  # Covers marketplace browsing, installing, configuring, and managing items.
  #
  # Actions:
  #   read  - Browse marketplace, view items, list installed, view reviews
  #   write - Install, uninstall, enable, disable, configure, submit reviews
  #   admin - Publish manifests, upload bundles, manage addon lifecycle
  #
  # Permission Matrix:
  #   marketplace_viewer: read
  #   marketplace_editor: read, write
  #   marketplace_admin:  read, write, admin
  marketplace.yaml: |
    apiVersion: api.cerbos.dev/v1
    resourcePolicy:
      version: "default"
      resource: "marketplace"
      importDerivedRoles:
        - shoehorn_roles
      rules:
        # Viewers can browse marketplace and view installed items
        - actions: ["read"]
          effect: EFFECT_ALLOW
          derivedRoles: ["marketplace_viewer"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

        # Editors can install, uninstall, configure, and review items
        - actions: ["write"]
          effect: EFFECT_ALLOW
          derivedRoles: ["marketplace_editor"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

        # Admins can publish manifests and upload bundles
        - actions: ["admin"]
          effect: EFFECT_ALLOW
          derivedRoles: ["marketplace_admin"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

  # Team Resource Policy
  # Teams are organizational groupings managed by platform admins.
  #
  # Permission Matrix:
  #   team_viewer: read, list
  #   team_editor: create, update, delete
  team.yaml: |
    apiVersion: api.cerbos.dev/v1
    resourcePolicy:
      version: "default"
      resource: "team"
      importDerivedRoles:
        - shoehorn_roles
      rules:
        # Viewers can read/list teams
        - actions: ["read", "list"]
          effect: EFFECT_ALLOW
          derivedRoles: ["team_viewer"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

        # Editors can create, update, and delete teams
        - actions: ["create", "update", "delete"]
          effect: EFFECT_ALLOW
          derivedRoles: ["team_editor"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

  # Addons Resource Policy
  # Covers addon runtime access (status, route proxying, frontend bundles).
  # Addon access reuses marketplace derived roles since addons are marketplace items.
  #
  # Permission Matrix:
  #   marketplace_viewer: read
  #   marketplace_editor: read, write
  #   marketplace_admin:  read, write, admin
  addons.yaml: |
    apiVersion: api.cerbos.dev/v1
    resourcePolicy:
      version: "default"
      resource: "addons"
      importDerivedRoles:
        - shoehorn_roles
      rules:
        # Viewers can check addon status and load frontend bundles
        - actions: ["read"]
          effect: EFFECT_ALLOW
          derivedRoles: ["marketplace_viewer"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

        # Editors can invoke addon API routes (POST/PUT/DELETE)
        - actions: ["write"]
          effect: EFFECT_ALLOW
          derivedRoles: ["marketplace_editor"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id

        # Admins can publish manifests and upload bundles
        - actions: ["admin"]
          effect: EFFECT_ALLOW
          derivedRoles: ["marketplace_admin"]
          condition:
            match:
              expr: request.resource.attr.tenant_id == request.principal.attr.tenant_id
