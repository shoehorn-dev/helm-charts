{{- if and .Values.redpanda.enabled (not .Values.redpanda.external.enabled) .Values.redpanda.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "shoehorn.fullname" . }}-redpanda
  namespace: {{ include "shoehorn.namespace.data" . }}
  labels:
    {{- include "shoehorn.labels" . | nindent 4 }}
    app.kubernetes.io/component: redpanda
spec:
  podSelector:
    matchLabels:
      {{- include "shoehorn.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redpanda
  policyTypes:
    - Ingress
  ingress:
    # Only Shoehorn's own namespaces may reach the Kafka/admin/proxy/schema ports.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ include "shoehorn.namespace.backend" . }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ include "shoehorn.namespace.data" . }}
      ports:
        - { protocol: TCP, port: 9092 }  # Kafka API (plaintext)
        - { protocol: TCP, port: 9093 }  # Kafka API (TLS)
        - { protocol: TCP, port: 8081 }  # Schema Registry
        - { protocol: TCP, port: 8082 }  # HTTP Proxy
        - { protocol: TCP, port: 9644 }  # Admin API
        - { protocol: TCP, port: 33145 } # Inter-broker RPC
{{- end }}
