{{- if and .Values.postgresql.enabled (not .Values.postgresql.external.enabled) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "shoehorn.fullname" . }}-postgresql
  namespace: {{ include "shoehorn.namespace.data" . }}
  labels:
    {{- include "shoehorn.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "shoehorn.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "shoehorn.fullname" . }}-postgresql
  namespace: {{ include "shoehorn.namespace.data" . }}
  labels:
    {{- include "shoehorn.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  serviceName: {{ include "shoehorn.fullname" . }}-postgresql
  replicas: {{ .Values.postgresql.replicas }}
  selector:
    matchLabels:
      {{- include "shoehorn.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        {{- include "shoehorn.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgresql
    spec:
      {{- include "shoehorn.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "shoehorn.serviceAccountName" . }}
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: postgresql
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 999
        image: {{ include "shoehorn.componentImage" (dict "component" .Values.postgresql "Values" .Values) }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: postgres
          containerPort: 5432
          protocol: TCP
        env:
        - name: POSTGRES_USER
          value: {{ .Values.postgresql.env.POSTGRES_USER | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgresql.env.POSTGRES_DB | quote }}
        {{- include "shoehorn.secretRef" (dict "env" "POSTGRES_PASSWORD" "root" .) | nindent 8 }}
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        args:
        - -c
        - config_file=/etc/postgresql/custom.conf
        livenessProbe:
          {{- toYaml .Values.postgresql.livenessProbe | nindent 12 }}
        readinessProbe:
          {{- toYaml .Values.postgresql.readinessProbe | nindent 12 }}
        resources:
          {{- toYaml .Values.postgresql.resources | nindent 12 }}
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: postgresql-config
          mountPath: /etc/postgresql/custom.conf
          subPath: custom.conf
          readOnly: true
        - name: pg-run
          mountPath: /var/run/postgresql
        - name: pg-tmp
          mountPath: /tmp
        {{- if .Values.postgresql.tls.enabled }}
        - name: postgresql-certs
          mountPath: /etc/postgresql/certs
          readOnly: true
        {{- end }}
      volumes:
      {{- if not .Values.postgresql.persistence.enabled }}
      - name: data
        emptyDir: {}
      {{- end }}
      - name: postgresql-config
        configMap:
          name: {{ include "shoehorn.fullname" . }}-postgresql-config
      - name: pg-run
        emptyDir:
          sizeLimit: 1Mi
      - name: pg-tmp
        emptyDir:
          sizeLimit: 100Mi
      {{- if .Values.postgresql.tls.enabled }}
      - name: postgresql-certs
        secret:
          secretName: {{ include "shoehorn.fullname" . }}-postgresql-tls-cert
          defaultMode: 0400
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.postgresql.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      {{- if .Values.postgresql.persistence.storageClass }}
      {{- if (eq "-" .Values.postgresql.persistence.storageClass) }}
      storageClassName: ""
      {{- else }}
      storageClassName: {{ .Values.postgresql.persistence.storageClass | quote }}
      {{- end }}
      {{- else }}
      storageClassName: {{ .Values.global.storageClass | quote }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.postgresql.persistence.size }}
  {{- end }}
{{- end }}
