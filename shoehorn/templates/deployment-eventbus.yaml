apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shoehorn.fullname" . }}-eventbus
  namespace: {{ include "shoehorn.namespace.backend" . }}
  labels:
    {{- include "shoehorn.eventbus.labels" . | nindent 4 }}
  annotations:
    {{- include "shoehorn.serviceAnnotations" .Values.eventbus.annotations | nindent 4 }}
spec:
  {{- if not .Values.eventbus.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount.eventbus }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "shoehorn.eventbus.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-backend.yaml") . | sha256sum }}
        {{- include "shoehorn.serviceAnnotations" .Values.eventbus.annotations | nindent 8 }}
      labels:
        {{- include "shoehorn.eventbus.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "shoehorn.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "shoehorn.serviceAccountName" . }}
      securityContext:
        {{- mustToYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
      # Wait for infrastructure services to be ready
      - name: wait-for-redpanda
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z {{ include "shoehorn.redpanda.host" . }} {{ include "shoehorn.redpanda.port" . }}; do echo waiting for redpanda; sleep 2; done;']
      containers:
      - name: eventbus
        securityContext:
          {{- mustToYaml .Values.securityContext | nindent 12 }}
        image: {{ include "shoehorn.componentImage" (dict "component" .Values.eventbus "Values" .Values) }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.eventbus.env.HTTP_PORT }}
          protocol: TCP
        - name: grpc
          containerPort: {{ .Values.eventbus.env.GRPC_PORT }}
          protocol: TCP
        envFrom:
        - configMapRef:
            name: {{ include "shoehorn.fullname" . }}-backend
        env:
        # Service-specific configuration
        - name: SERVICE_NAME
          value: "eventbus"
        - name: HTTP_PORT
          value: {{ .Values.eventbus.env.HTTP_PORT | quote }}
        - name: GRPC_PORT
          value: {{ .Values.eventbus.env.GRPC_PORT | quote }}

        # Database configuration (secrets and dynamic values)
        - name: DB_HOST
          value: {{ include "shoehorn.postgresql.host" . }}
        {{- include "shoehorn.secretRef" (dict "env" "DB_PASSWORD" "root" .) | nindent 8 }}

        # Valkey/Redis (secret only, host/port in ConfigMap)
        {{- include "shoehorn.secretRef" (dict "env" "VALKEY_PASSWORD" "root" .) | nindent 8 }}

        # Meilisearch
        - name: MEILISEARCH_HOST
          value: {{ include "shoehorn.meilisearch.host" . }}
        - name: MEILISEARCH_PORT
          value: {{ include "shoehorn.meilisearch.port" . | quote }}
        - name: MEILISEARCH_PROTOCOL
          value: {{ include "shoehorn.meilisearch.protocol" . }}
        - name: MEILISEARCH_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secret.existingSecret }}
              key: {{ .Values.secret.mappings.MEILISEARCH_MASTER_KEY }}

        # Distributed Tracing (OpenTelemetry)
        - name: TRACING_ENABLED
          value: {{ .Values.global.tracing.enabled | default false | quote }}
        {{- if .Values.global.tracing.otlpEndpoint }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ .Values.global.tracing.otlpEndpoint | quote }}
        {{- end }}

        # gRPC mTLS Configuration
        - name: GRPC_TLS_ENABLED
          value: {{ .Values.global.mtls.enabled | default false | quote }}
        {{- if .Values.global.mtls.enabled }}
        - name: GRPC_TLS_CERT_FILE
          value: {{ .Values.global.mtls.certFile | quote }}
        - name: GRPC_TLS_KEY_FILE
          value: {{ .Values.global.mtls.keyFile | quote }}
        - name: GRPC_TLS_CA_FILE
          value: {{ .Values.global.mtls.caFile | quote }}
        {{- end }}

        # Redpanda/Kafka
        - name: REDPANDA_BROKERS
          value: {{ include "shoehorn.redpanda.brokers" . }}

        volumeMounts:
        {{- include "shoehorn.grpcMtlsVolumeMounts" . | nindent 8 }}

        livenessProbe:
          {{- mustToYaml .Values.eventbus.livenessProbe | nindent 12 }}
        readinessProbe:
          {{- mustToYaml .Values.eventbus.readinessProbe | nindent 12 }}
        resources:
          {{- mustToYaml .Values.eventbus.resources | nindent 12 }}
      volumes:
      {{- include "shoehorn.grpcMtlsVolumes" . | nindent 6 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- mustToYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- mustToYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- mustToYaml . | nindent 8 }}
      {{- end }}
