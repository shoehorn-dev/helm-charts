# Default values for the Shoehorn chart.

global:
  # Required. Set to the hostname customers use to reach Shoehorn on your infra
  # (e.g. idp.example.com). The chart fails to render if left at the placeholder.
  domain: idp.example.com
  storageClass: ""

  # Catalog annotations (shoehorn.dev/ prefixed) applied to every workload.
  # Per-service annotations override these per key.
  annotations: {}
    # owner: platform-team
    # tier: tier1

  # Comma-separated proxy IPs/CIDRs the API trusts for X-Forwarded-For and
  # X-Forwarded-Proto. Set this to the source range your ingress traffic
  # arrives from so request logs, rate limiting, and audit records show the
  # real client IP instead of the proxy's. Empty means the API treats the
  # proxy's own IP as the client IP. See the chart README, "Operational notes".
  trustedProxies: ""

  # OpenTelemetry tracing
  tracing:
    enabled: false
    otlpEndpoint: ""        # e.g. "jaeger-collector.observability:4317"

  # gRPC mTLS for inter-service traffic (api, forge, worker, crawler, eventbus, cerbos)
  mtls:
    enabled: false
    createCertificates: true
    issuerName: shoehorn-ca-issuer
    issuerKind: ClusterIssuer        # ClusterIssuer or Issuer
    certFile: "/etc/shoehorn/certs/tls.crt"
    keyFile: "/etc/shoehorn/certs/tls.key"
    caFile: "/etc/shoehorn/certs/ca.crt"

  # Tenant identity. slug is required.
  organization:
    slug: ""
    name: ""

  # Pull secrets for private mirrors. Public Docker Hub needs none.
  imagePullSecrets: []

# cert-manager.
# `install: true` bundles cert-manager as a sub-chart.
# `install: false` requires an existing cert-manager in the cluster.
certManager:
  install: false
  createClusterIssuer: true
  installCRDs: true
  global:
    leaderElection:
      namespace: cert-manager
  issuer:
    name: shoehorn-ca-issuer
    kind: ClusterIssuer
    ca:
      organizationName: Shoehorn Platform
      duration: 87600h
      renewBefore: 8760h

# Image defaults for every service in the chart.
#
# registry:   Prepended to each per-service `image.repository`. Skipped when
#             the repository already starts with a registry host (first path
#             segment contains `.` or `:`, e.g. `ghcr.io/foo/bar`). Set to ""
#             to drop the prefix and rely on the runtime's default registry.
#             Override this one key to point the whole stack at a mirror.
# repository: Used only by the rbac-sync Job (the `shoehorn` CLI image).
#             Per-service blocks set their own repository.
# tag:        Fallback when a per-service `image.tag` is empty.
image:
  registry: docker.io
  repository: shoehorned/shoehorn
  pullPolicy: IfNotPresent
  tag: "v0.5.21"

# Service catalog annotations (prefixed with shoehorn.dev/) are set per service
# below, or chart-wide via global.annotations (per-service keys win). Supported
# keys: team, repositoryUrl, slackChannel, tier, tags, links, runbooks,
# licenses, definitionUrl, changelog-path, relations.

# Have the chart create docker-registry secrets from values, instead of
# referencing existing ones via global.imagePullSecrets.
registryCredentials:
  enabled: false
  registries: []
  # - name: ghcr
  #   registry: ghcr.io
  #   username: ""
  #   password: ""
  #   email: ""
  existingDockerConfigJson: ""

replicaCount:
  api: 1
  web: 1
  eventbus: 1
  worker: 1
  crawler: 1
  forge: 1

# Each credential is referenced by `<thing>SecretRef: { name, key }`.
# Set `secret.defaultName` once and per-credential refs can omit `name`.
# The chart never creates these Secrets. Provide them out of band.
secret:
  defaultName: ""

# Optional volumes mounted on every backend pod.
extraVolumes: []
# - name: github-private-key
#   secret:
#     secretName: my-github-secret
#     items:
#       - key: github_app_private_key
#         path: private-key

extraVolumeMounts: []
# - name: github-private-key
#   mountPath: /var/secrets/github
#   readOnly: true

# Pick one ingress strategy.

# Traefik IngressRoute (CRDs)
ingressRoute:
  enabled: true
  tls:
    enabled: true
    certResolver: letsencrypt

# Envoy Gateway HTTPRoute
httpRoute:
  enabled: false
  gatewayName: eg
  gatewayNamespace: envoy-gateway-system
  annotations: {}
  filters:
    api: []
    web: []

# Standard Kubernetes Ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
  tls: []
  hosts: []

service:
  type: ClusterIP
  annotations: {}

# SMTP for notification subscriptions, alerts, and the in-app feedback /
# bug-report button (top bar). Leave disabled if you don't want Shoehorn
# sending mail.
smtp:
  enabled: false
  host: ""
  port: 587
  username: ""
  from: ""
  # Address that receives in-app feedback and bug reports, usually a team
  # alias like platform-team@example.com. If left empty, reports go to
  # feedback@shoehorn.dev (the Shoehorn team), so set your own unless that's
  # what you want.
  feedbackEmail: ""
  passwordSecretRef:
    name: ""
    key: ""

# Notification secrets stored as Kubernetes Secrets.
# Reference one from a subscription with secret://<name>.
notifications:
  secrets: []
  # - name: slack_prod
  #   secretRef:
  #     name: shoehorn-notif-secrets
  #     key: slack-prod

# API Gateway
api:
  name: api
  logLevel: "info"
  annotations: {}
    # team: "platform-team"
    # repositoryUrl: "https://github.com/org/shoehorn-api"
    # tier: "tier1"
  image:
    repository: shoehorned/shoehorn-api
    tag: ""
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: 1000m, memory: 1Gi }
  env:
    LOG_FORMAT: json
    HTTP_PORT: "8080"
    # GitHub repository discovery (uncomment to enable)
    # GITHUB_ORGANIZATIONS: "my-org"
    # GITHUB_REPOSITORIES: "my-org/repo1,my-org/repo2"
    # GITHUB_FORGE_ORGANIZATION: "my-org"
    # GITHUB_RATE_LIMIT_PER_HOUR: "1000"
    # GITHUB_CONCURRENT_REPOS: "5"
    # GITHUB_CACHE_TTL_MINUTES: "15"
    # DEBUG_GITHUB_API: "false"
  livenessProbe:
    httpGet: { path: /healthz, port: 8080 }
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    httpGet: { path: /readiness, port: 8080 }
    initialDelaySeconds: 10
    periodSeconds: 5
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

# Web Frontend
web:
  name: web
  logLevel: "info"
  annotations: {}
  image:
    repository: shoehorned/shoehorn-web
    tag: ""
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  env:
    VITE_ENVIRONMENT: production
  livenessProbe:
    httpGet: { path: /, port: 4173 }
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    httpGet: { path: /, port: 4173 }
    initialDelaySeconds: 5
    periodSeconds: 5
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

# EventBus
eventbus:
  name: eventbus
  logLevel: "info"
  annotations: {}
  image:
    repository: shoehorned/shoehorn-eventbus
    tag: ""
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  env:
    GRPC_PORT: "9083"
    HTTP_PORT: "8083"
  livenessProbe:
    httpGet: { path: /healthz, port: 8083 }
    initialDelaySeconds: 20
    periodSeconds: 10
  readinessProbe:
    httpGet: { path: /readiness, port: 8083 }
    initialDelaySeconds: 10
    periodSeconds: 5
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

# Worker
worker:
  name: worker
  logLevel: "info"
  annotations: {}
  image:
    repository: shoehorned/shoehorn-worker
    tag: ""
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  env:
    GRPC_PORT: "9085"
    HTTP_PORT: "8085"
  livenessProbe:
    httpGet: { path: /healthz, port: 8085 }
    initialDelaySeconds: 20
    periodSeconds: 10
  readinessProbe:
    httpGet: { path: /readiness, port: 8085 }
    initialDelaySeconds: 10
    periodSeconds: 5
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

# Crawler
crawler:
  name: crawler
  logLevel: "info"
  annotations: {}
  image:
    repository: shoehorned/shoehorn-crawler
    tag: ""
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  env:
    GRPC_PORT: "9086"
    HTTP_PORT: "8086"
  livenessProbe:
    httpGet: { path: /healthz, port: 8086 }
    initialDelaySeconds: 20
    periodSeconds: 10
  readinessProbe:
    httpGet: { path: /readiness, port: 8086 }
    initialDelaySeconds: 10
    periodSeconds: 5
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

# Cloud provider resource discovery (runs in the crawler).
cloudProviders:
  syncInterval: "15m"
  upcloud:
    enabled: false
    syncInterval: ""        # empty = inherit cloudProviders.syncInterval
    apiBaseUrl: ""          # empty = https://api.upcloud.com/1.3
    tokenSecretRef:
      name: ""
      key: ""

# Forge (workflow engine and scaffolding)
forge:
  name: forge
  logLevel: "info"
  annotations: {}
  image:
    repository: shoehorned/shoehorn-forge
    tag: ""
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  env:
    GRPC_PORT: "9087"
    HTTP_PORT: "8087"
    # production: containers required, direct execution blocked.
    # development: direct execution allowed (insecure; tests/dev only).
    FORGE_ENVIRONMENT: "production"
  livenessProbe:
    httpGet: { path: /healthz, port: 8087 }
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    httpGet: { path: /readiness, port: 8087 }
    initialDelaySeconds: 20
    periodSeconds: 5
    failureThreshold: 3
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

# Authentication (OIDC). Providers: zitadel, okta, entra-id.
auth:
  provider: zitadel

  # Expected JWT audience. Resolution:
  #   1. If set, this value is used verbatim.
  #   2. If empty and provider is okta with the default authorization server
  #      (`/oauth2/default`), audience auto-defaults to "api://default" —
  #      Okta's own factory default. You do not need to set anything.
  #   3. Otherwise (Zitadel, Entra ID, or Okta with a custom auth server),
  #      audience falls back to the active provider's client_id.
  # Set this only when your IdP issues tokens with an audience that differs
  # from the auto-derived value (typically: custom Okta auth servers, or a
  # Zitadel API audience that isn't the OIDC client_id).
  audience: ""

  zitadel:
    projectId: ""
    clientId: ""
    externalUrl: "https://auth.example.com"
    insecure: false
    serviceUserPatSecretRef:        # required when orgdata.enabled and provider includes zitadel
      name: ""
      key: ""

  okta:
    domain: ""
    clientId: ""
    issuer: ""
    authorizationServer: default
    clientSecretRef:                # required when auth.provider is "okta"
      name: ""
      key: ""
    apiTokenSecretRef:              # required when orgdata syncs from Okta
      name: ""
      key: ""

  entraId:
    tenantId: ""
    clientId: ""
    authority: ""
    clientSecretRef:                # required when auth.provider is "entra-id"
      name: ""
      key: ""

  # GitHub App. appId / installationId are public identifiers.
  github:
    appId: ""
    installationId: ""
    forge:
      appId: ""
      installationId: ""
      organization: ""

  argocd:
    tokenSecretRef:
      name: ""
      key: ""

  session:
    maxAge: "8h"                    # Go duration, 5m to 720h
    jwtSecretRef:                   # required
      name: ""
      key: jwt_secret
    encryptionKeyRef:               # required
      name: ""
      key: auth_encryption_key
    secretsEncryptionKeyRef:        # for persisted-secret encryption (addons, integrations)
      name: ""
      key: secrets_encryption_key

  csrf:
    enabled: true

  # Multi-provider org sync. Users deduped by email, teams by name.
  orgdata:
    enabled: false
    providers: []                   # e.g. ["okta", "zitadel"]
    primaryProvider: ""             # used for conflict resolution


# Cerbos (always deployed; required by the platform).
cerbos:
  annotations: {}
  image:
    repository: shoehorned/shoehorn-cerbos
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 512Mi }
  audit:
    enabled: true
    retentionPeriod: "168h"
  # TLS follows global.mtls.enabled (no separate toggle).

# PostgreSQL 18.
# Set enabled: false and configure `external` to use a managed instance.
postgresql:
  name: postgresql
  annotations: {}
  enabled: true
  # Two-user model:
  #   superuserPasswordSecretRef → POSTGRES_PASSWORD (shoehorn_user, BYPASSRLS, migrations)
  #   passwordSecretRef          → DB_PASSWORD       (app_user, NOBYPASSRLS, runtime)
  #
  # Both values get embedded in DATABASE_URL / MIGRATION_DATABASE_URL as
  # `postgresql://user:password@host:port/db`. The chart does NOT URL-encode
  # the password. Generate these two keys with `openssl rand -hex` (URL-safe),
  # not `-base64`. A `/` or `+` in the password breaks the URL parser at the
  # first occurrence and migrations fail with "invalid port" errors.
  superuserPasswordSecretRef:
    name: ""
    key: postgres_password
  passwordSecretRef:
    name: ""
    key: db_password
  image:
    repository: shoehorned/shoehorn-postgres
    tag: "v18.3-pgaudit-1.0"
  replicas: 1
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: 1000m, memory: 2Gi }
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  podSecurityContext:
    fsGroup: 999
    fsGroupChangePolicy: OnRootMismatch
    runAsNonRoot: true
    runAsUser: 999
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 999
  env:
    POSTGRES_USER: shoehorn_user
    POSTGRES_DB: shoehorn
  # Per-service connection pool. Total opens across services should stay below
  # PostgreSQL max_connections (default 100).
  pool:
    maxOpenConns: 25
    maxIdleConns: 5
    maxLifetime: "5m"
    maxIdleTime: "90s"
  livenessProbe:
    exec:
      command: [sh, -c, "pg_isready -U shoehorn_user -d shoehorn"]
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    exec:
      command: [sh, -c, "pg_isready -U shoehorn_user -d shoehorn"]
    initialDelaySeconds: 10
    periodSeconds: 5
  external:
    enabled: false
    host: ""
    port: 5432
    database: shoehorn
    user: shoehorn_user
  # pgaudit extension is always preloaded (required for migration 091).
  # `enabled` controls whether logging is active.
  pgaudit:
    enabled: true
    log: "write,ddl,role"
    logCatalog: false
    logRelation: true
    logParameter: true
  tls:
    enabled: false
    createCertificate: true
    issuerName: shoehorn-ca-issuer
    issuerKind: ClusterIssuer
    certFile: "/etc/postgresql/certs/tls.crt"
    keyFile: "/etc/postgresql/certs/tls.key"
    caFile: "/etc/postgresql/certs/ca.crt"
    sslMode: "require"      # disable, allow, prefer, require, verify-ca, verify-full

# Meilisearch.
# Set enabled: false and configure `external` to use Meilisearch Cloud or another instance.
meilisearch:
  name: meilisearch
  annotations: {}
  enabled: true
  # The master key is used by the in-cluster StatefulSet and as the search auth
  # token consumed by api/forge/crawler/worker.
  masterKeySecretRef:
    name: ""
    key: meilisearch_master_key
  image:
    repository: getmeili/meilisearch
    tag: "v1.43.0"
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: 1000m, memory: 2Gi }
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  podSecurityContext:
    fsGroup: 1000
    runAsNonRoot: true
    runAsUser: 1000
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 1000
  env:
    MEILI_DB_PATH: /meili_data
    MEILI_ENV: production
    MEILI_NO_ANALYTICS: "true"
  startupProbe:
    httpGet: { path: /health, port: 7700 }
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 30
    timeoutSeconds: 3
  # Meilisearch v1.43+ returns 500 on /health after a successful task-queue
  # compaction to signal "please restart". The default failureThreshold gives
  # a 30s buffer before the pod restarts.
  livenessProbe:
    httpGet: { path: /health, port: 7700 }
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    httpGet: { path: /health, port: 7700 }
    initialDelaySeconds: 10
    periodSeconds: 5
  external:
    enabled: false
    host: ""
    port: 7700
    protocol: "https"
  tls:
    enabled: false
    createCertificate: true
    issuerName: shoehorn-ca-issuer
    issuerKind: ClusterIssuer
    certFile: "/etc/meilisearch/certs/tls.crt"
    keyFile: "/etc/meilisearch/certs/tls.key"

# Valkey (Redis-compatible).
# Set enabled: false and configure `external` to use ElastiCache, Redis Cloud, etc.
valkey:
  name: valkey
  annotations: {}
  enabled: true
  passwordSecretRef:
    name: ""
    key: valkey_password
  image:
    repository: valkey/valkey
    tag: "9.0.3"
  replicas: 1
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
  podSecurityContext:
    fsGroup: 999
    runAsNonRoot: true
    runAsUser: 999
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 999
  command:
    - valkey-server
    - --appendonly
    - "yes"
    - --maxmemory
    - "512mb"
    - --maxmemory-policy
    - "allkeys-lru"
  # Probes authenticate via REDISCLI_AUTH so the password never appears in ps listings.
  # statefulset-valkey.yaml injects REDISCLI_AUTH from VALKEY_PASSWORD when a password is configured.
  livenessProbe:
    exec:
      command: [sh, -c, "valkey-cli --no-auth-warning ping | grep -q PONG"]
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    exec:
      command: [sh, -c, "valkey-cli --no-auth-warning ping | grep -q PONG"]
    initialDelaySeconds: 5
    periodSeconds: 5
  external:
    enabled: false
    host: ""
    port: 6379

# Redpanda (Kafka-compatible).
# Set enabled: false and configure `external` to use Confluent Cloud, MSK, Redpanda Cloud, etc.
redpanda:
  name: redpanda
  annotations: {}
  enabled: true
  image:
    repository: redpandadata/redpanda
    tag: v26.1.6
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: 2000m, memory: 4Gi }
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  replicas: 3
  podSecurityContext:
    fsGroup: 101
    runAsNonRoot: true
    runAsUser: 101
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 101
  config:
    smp: 1
    memory: 512M
  livenessProbe:
    exec:
      command: [/bin/sh, -c, "rpk cluster health | grep -E 'Healthy:.+true'"]
    initialDelaySeconds: 60
    periodSeconds: 30
  readinessProbe:
    exec:
      command: [/bin/sh, -c, "rpk cluster health | grep -E 'Healthy:.+true'"]
    initialDelaySeconds: 30
    periodSeconds: 10
  external:
    enabled: false
    brokers: ""           # e.g. "broker-1.example.com:9092,broker-2.example.com:9092"
  tls:
    enabled: false
    createCertificate: true
    issuerName: shoehorn-ca-issuer
    issuerKind: ClusterIssuer
    certFile: "/etc/redpanda/certs/tls.crt"
    keyFile: "/etc/redpanda/certs/tls.key"
    caFile: "/etc/redpanda/certs/ca.crt"
    requireClientAuth: false

# Kroki: diagram rendering for TechDocs (PlantUML, C4, BlockDiag, BPMN, ...).
# Mermaid/Nomnoml/GraphViz render client-side and don't need this.
kroki:
  annotations: {}
  enabled: false
  image:
    repository: yuzutech/kroki
    tag: "0.26.0"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  external:
    enabled: false
    url: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

nodeSelector: {}
tolerations: []
affinity: {}

podDisruptionBudget:
  enabled: true
  minAvailable: 1

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
  prometheusRule:
    enabled: true

# RBAC.
# Role assignment uses runtime env vars: TENANT_ADMIN_USERS, TENANT_ADMIN_GROUPS,
# TENANT_VIEWER_USERS, TENANT_VIEWER_GROUPS.
rbac:
  enabled: true
  # Bootstrap admin gets tenant:admin on first login when no roles exist in DB.
  roleAssignment:
    tenantAdmin:
      user: ""        # email (single)
      group: ""       # IdP group name (single)
  sync:
    enabled: false
    mode: "manual"
    lock:
      ttl: "90s"
      retries: 3
    healthCheck:
      maxRetries: 10
  validation:
    strict: true
    database: true
  audit:
    enabled: true
    logLevel: "info"
  # OAuth group mappings per tenant (used by sync job)
  tenants: []
