suite: global.annotations inheritance and per-service override
release:
  name: test-release
  namespace: test-ns
set:
  global.domain: idp.acme.test
  global.organization.slug: acme
  auth.provider: zitadel
  auth.zitadel.projectId: p123
  auth.zitadel.clientId: c123
  auth.zitadel.externalUrl: https://acme.zitadel.cloud
  postgresql.superuserPasswordSecretRef: { name: db, key: postgres_password }
  postgresql.passwordSecretRef: { name: db, key: db_password }
  valkey.passwordSecretRef: { name: cache, key: valkey_password }
  meilisearch.masterKeySecretRef: { name: search, key: meili_key }
  auth.session.jwtSecretRef: { name: sess, key: jwt }
  auth.session.encryptionKeyRef: { name: sess, key: enc }
  auth.session.secretsEncryptionKeyRef: { name: sess, key: secenc }
tests:
  - it: applies global annotations to an app deployment (controller and pod)
    set:
      global.annotations: { owner: platform-team, tier: Silver }
    template: templates/deployment-api.yaml
    asserts:
      - equal:
          path: metadata.annotations["shoehorn.dev/owner"]
          value: platform-team
      - equal:
          path: spec.template.metadata.annotations["shoehorn.dev/tier"]
          value: Silver

  - it: lets a per-service annotation override the global one per key
    set:
      global.annotations: { owner: platform-team, tier: Silver }
      api.annotations: { team: api-team, tier: Gold }
    template: templates/deployment-api.yaml
    asserts:
      - equal:
          path: metadata.annotations["shoehorn.dev/tier"]
          value: Gold
      - equal:
          path: metadata.annotations["shoehorn.dev/owner"]
          value: platform-team
      - equal:
          path: metadata.annotations["shoehorn.dev/team"]
          value: api-team

  - it: inherits global annotations on an infra StatefulSet
    set:
      global.annotations: { owner: platform-team }
    template: templates/statefulset-postgresql.yaml
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.annotations["shoehorn.dev/owner"]
          value: platform-team
      - equal:
          path: spec.template.metadata.annotations["shoehorn.dev/owner"]
          value: platform-team
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep

  - it: emits no pod annotations block when nothing is set
    template: templates/statefulset-valkey.yaml
    documentIndex: 1
    asserts:
      - notExists:
          path: spec.template.metadata.annotations
