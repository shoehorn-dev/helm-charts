suite: shoehorn.secretRef helper — typed-ref shape
release:
  name: test-release
  namespace: test-ns
set:
  auth.provider: zitadel
  auth.zitadel.projectId: test
  auth.zitadel.clientId: test
  auth.zitadel.externalUrl: https://example.test
tests:
  - it: emits secretKeyRef when *SecretRef.key is set with explicit name
    set:
      postgresql.superuserPasswordSecretRef:
        name: my-db-secret
        key: postgres_password
      postgresql.passwordSecretRef:
        name: my-db-secret
        key: db_password
      valkey.passwordSecretRef:
        name: my-cache-secret
        key: valkey_password
      meilisearch.masterKeySecretRef:
        name: my-search-secret
        key: meili_key
      auth.session.jwtSecretRef:
        name: my-session-secret
        key: jwt
      auth.session.encryptionKeyRef:
        name: my-session-secret
        key: enc
      auth.session.secretsEncryptionKeyRef:
        name: my-session-secret
        key: secenc
    template: templates/deployment-eventbus.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-db-secret
                key: db_password
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VALKEY_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-cache-secret
                key: valkey_password

  - it: falls back to secret.defaultName when *SecretRef.name is empty
    set:
      secret.defaultName: shoehorn-shared
      postgresql.superuserPasswordSecretRef:
        key: postgres_password
      postgresql.passwordSecretRef:
        key: db_password
      valkey.passwordSecretRef:
        key: valkey_password
      meilisearch.masterKeySecretRef:
        key: meili_key
      auth.session.jwtSecretRef:
        key: jwt
      auth.session.encryptionKeyRef:
        key: enc
      auth.session.secretsEncryptionKeyRef:
        key: secenc
    template: templates/deployment-eventbus.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: shoehorn-shared
                key: db_password

  - it: fails chart render when a required *SecretRef.key is missing
    set:
      secret.defaultName: shared
      postgresql.superuserPasswordSecretRef:
        key: postgres_password
      postgresql.passwordSecretRef:
        key: ""
      valkey.passwordSecretRef:
        key: valkey_password
      meilisearch.masterKeySecretRef:
        key: meili_key
      auth.session.jwtSecretRef:
        key: jwt
      auth.session.encryptionKeyRef:
        key: enc
      auth.session.secretsEncryptionKeyRef:
        key: secenc
    asserts:
      - failedTemplate:
          errorPattern: 'Missing required SecretRef for env DB_PASSWORD'

  - it: fails chart render when *SecretRef.key is set but no name resolvable
    set:
      postgresql.superuserPasswordSecretRef:
        key: postgres_password
      postgresql.passwordSecretRef:
        key: db_password
      valkey.passwordSecretRef:
        name: cache
        key: valkey_password
      meilisearch.masterKeySecretRef:
        name: search
        key: meili_key
      auth.session.jwtSecretRef:
        name: session
        key: jwt
      auth.session.encryptionKeyRef:
        name: session
        key: enc
      auth.session.secretsEncryptionKeyRef:
        name: session
        key: secenc
    asserts:
      - failedTemplate:
          errorPattern: 'Cannot resolve secret name for env'
