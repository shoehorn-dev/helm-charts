apiVersion: v2
name: shoehorn-k8s-agent
description: Kubernetes agent for Shoehorn, the Intelligent Developer Platform. Discovers and syncs workloads.
type: application
version: 0.5.001
appVersion: "0.5.001"

home: https://shoehorn.dev
icon: https://shoehorn.dev/maskot1.png

keywords:
  - kubernetes
  - monitoring
  - discovery
  - shoehorn
  - service-catalog
  - internal-developer-platform
  - workload-discovery
  - k8s-agent

maintainers:
  - name: Shoehorn Team
    email: support@shoehorn.dev
    url: https://github.com/shoehorn-dev

sources:
  - https://github.com/shoehorn-dev/helm-charts

# Kubernetes version requirement
kubeVersion: ">=1.24.0-0"

# Chart dependencies (none - standalone agent)
dependencies: []

annotations:
  artifacthub.io/category: integration-delivery
  artifacthub.io/license: Apache-2.0
  artifacthub.io/operator: "false"
  artifacthub.io/prerelease: "false"
  artifacthub.io/containsSecurityUpdates: "false"

  artifacthub.io/links: |
    - name: Documentation
      url: https://docs.shoehorn.dev
    - name: GitHub
      url: https://github.com/shoehorn-dev/helm-charts
    - name: Support
      url: https://github.com/shoehorn-dev/helm-charts/issues

  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/helm/shoehorn/shoehorn

  artifacthub.io/changes: |
    - kind: fixed
      description: "Image tag default now includes the 'v' prefix, fixing ImagePullBackOff when image.tag is not set"
    - kind: added
      description: "Optional cluster.provider, cluster.region, and cluster.environment values for enriching cluster identity in Shoehorn"
    - kind: added
      description: "agent.rateLimit and agent.rateBurst values to tune the watcher event rate on large clusters; examples/values-large-cluster.yaml preset for 200+ node clusters"
    - kind: added
      description: "agent.kubernetes.scopeMode: namespaces for namespace-scoped watching with per-namespace Roles plus a minimal ClusterRole; examples/values-scoped.yaml preset for one-install-per-tenant on shared clusters"
    - kind: security
      description: "Tightened scoped-mode RBAC: removed the unused ciliumclusterwidenetworkpolicies grant and dropped node get (list-only); scoped mode now fails fast when combined with gitops.watchAllNamespaces=true"
