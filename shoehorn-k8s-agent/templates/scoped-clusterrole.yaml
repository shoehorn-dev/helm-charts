{{- if and .Values.rbac.create (eq .Values.agent.kubernetes.scopeMode "namespaces") -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "shoehorn-agent.fullname" . }}-scoped
  labels:
    {{- include "shoehorn-agent.labels" . | nindent 4 }}
  annotations:
    {{- include "shoehorn-agent.annotations" . | nindent 4 }}
rules:
  # Namespace labels drive team ownership; scoped mode GETs only the
  # configured namespaces by name.
  - apiGroups: [""]
    resources:
      - namespaces
    resourceNames:
      {{- range .Values.agent.kubernetes.namespaces }}
      - {{ . | quote }}
      {{- end }}
    verbs:
      - get
  # Node count (heartbeat) and provider detection. The agent only lists nodes,
  # it never watches them, so get+list is the complete set (intentionally
  # tighter than cluster mode's get/list/watch). Read-only, not
  # tenant-sensitive. Remove if your policy forbids it; the agent degrades
  # gracefully (heartbeat omits nodeCount, provider stays unset).
  - apiGroups: [""]
    resources:
      - nodes
    verbs:
      - get
      - list
  # Cilium clusterwide network policies are a cluster-scoped CRD. Read-only,
  # graceful skip if the CRD is not installed.
  - apiGroups: ["cilium.io"]
    resources:
      - ciliumclusterwidenetworkpolicies
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "shoehorn-agent.fullname" . }}-scoped
  labels:
    {{- include "shoehorn-agent.labels" . | nindent 4 }}
  annotations:
    {{- include "shoehorn-agent.annotations" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "shoehorn-agent.fullname" . }}-scoped
subjects:
  - kind: ServiceAccount
    name: {{ include "shoehorn-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
