{{- if and .Values.netobserver.enabled .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "shoehorn-agent.fullname" . }}-netobserver
  labels:
    {{- include "shoehorn-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: netobserver
  annotations:
    {{- include "shoehorn-agent.annotations" . | nindent 4 }}
rules:
  # Read-only access to Pods and Services for IP → entity resolution
  - apiGroups: [""]
    resources:
      - pods
      - services
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "shoehorn-agent.fullname" . }}-netobserver
  labels:
    {{- include "shoehorn-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: netobserver
  annotations:
    {{- include "shoehorn-agent.annotations" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "shoehorn-agent.fullname" . }}-netobserver
subjects:
  - kind: ServiceAccount
    name: {{ include "shoehorn-agent.fullname" . }}-netobserver
    namespace: {{ .Release.Namespace }}
{{- end }}
