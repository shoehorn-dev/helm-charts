{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "shoehorn-agent.fullname" . }}
  labels:
    {{- include "shoehorn-agent.labels" . | nindent 4 }}
  annotations:
    {{- include "shoehorn-agent.annotations" . | nindent 4 }}
rules:
  # Read-only access to workload resources
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - watch

  # Read-only access to batch resources
  - apiGroups: ["batch"]
    resources:
      - cronjobs
      - jobs
    verbs:
      - get
      - list
      - watch

  # Read-only access to core resources
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - services
      - events
    verbs:
      - get
      - list
      - watch

  # Read-only access to networking resources
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs:
      - get
      - list
      - watch

  # Read-only access to Cilium network policies (graceful skip if CRDs not installed)
  - apiGroups: ["cilium.io"]
    resources:
      - ciliumnetworkpolicies
      - ciliumclusterwidenetworkpolicies
    verbs:
      - get
      - list
      - watch

  # Read-only access to pod metrics (metrics-server)
  # Required for resource optimization insights (CPU/memory usage vs requests/limits)
  # Gracefully degrades if metrics-server is not deployed
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
    verbs:
      - get
      - list

  {{- if and .Values.agent.gitops.tool .Values.agent.gitops.watchAllNamespaces }}
  # GitOps CRD access (cluster-wide, enabled because gitops.watchAllNamespaces=true)
  {{- if eq .Values.agent.gitops.tool "argocd" }}
  - apiGroups: ["argoproj.io"]
    resources:
      - applications
    verbs:
      - get
      - list
      - watch
  {{- end }}
  {{- if eq .Values.agent.gitops.tool "fluxcd" }}
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources:
      - kustomizations
    verbs:
      - get
      - list
      - watch
      - patch
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources:
      - helmreleases
    verbs:
      - get
      - list
      - watch
      - patch
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources:
      - gitrepositories
      - helmrepositories
    verbs:
      - get
      - list
      - watch
  {{- end }}
  {{- end }}
  # Leader election permissions
  # Required for high availability with multiple replicas
  # Leases are created in the agent's deployment namespace
  - apiGroups: ["coordination.k8s.io"]
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
{{- end }}
