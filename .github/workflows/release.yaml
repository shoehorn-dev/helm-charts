name: Release

on:
  push:
    tags:
      - 'shoehorn-v*'
      - 'shoehorn-k8s-agent-v*'

env:
  REGISTRY: ghcr.io

jobs:
  release-helm:
    name: Release Helm Chart
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: '4.1.1'

      - name: Add Helm repositories
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update

      - name: Determine chart name from tag
        id: chart
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == shoehorn-k8s-agent-v* ]]; then
            echo "name=shoehorn-k8s-agent" >> $GITHUB_OUTPUT
            echo "version=${TAG#shoehorn-k8s-agent-v}" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == shoehorn-v* ]]; then
            echo "name=shoehorn" >> $GITHUB_OUTPUT
            echo "version=${TAG#shoehorn-v}" >> $GITHUB_OUTPUT
          else
            echo "Unknown tag format: $TAG"
            exit 1
          fi

      - name: Update Chart.yaml version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.chart.outputs.version }}/" ${{ steps.chart.outputs.name }}/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.chart.outputs.version }}\"/" ${{ steps.chart.outputs.name }}/Chart.yaml

      - name: Build chart dependencies
        run: |
          helm dependency build ${{ steps.chart.outputs.name }}

      - name: Package Helm chart
        run: |
          helm package ${{ steps.chart.outputs.name }}

      - name: Log in to Container Registry for Helm
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Push Helm chart to OCI registry
        run: |
          helm push ${{ steps.chart.outputs.name }}-*.tgz oci://${{ env.REGISTRY }}/${{ github.repository }}

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            ${{ steps.chart.outputs.name }}-*.tgz \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
