name: Release

# Releases a single Helm chart. Charts are released event-driven: each product
# repo (shoehorn-platform, shoehorn-k8s-agents) fires a repository_dispatch when
# it publishes a new version. workflow_dispatch is the manual fallback.
#
# There is deliberately no `push: tags` trigger and no in-workflow tag push, so a
# release run can never re-trigger itself. The release tag is created by
# `gh release create --target <sha>` as the final step.
on:
  repository_dispatch:
    types:
      - release-shoehorn
      - release-shoehorn-k8s-agent
  workflow_dispatch:
    inputs:
      chart:
        description: 'Chart to release'
        required: true
        type: choice
        options:
          - shoehorn
          - shoehorn-k8s-agent
      version:
        description: 'Version override (default: dispatch payload, else resolved from the app source)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  release-helm:
    name: Release Helm Chart
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Generate release bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v2
        with:
          client-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: shoehorn-dev
          repositories: helm-charts,shoehorn-platform

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: '4.1.1'

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install oras
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0

      - name: Add Helm repositories
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update

      - name: Determine chart
        id: chart
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          INPUT_CHART: ${{ inputs.chart }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            CHART="$INPUT_CHART"
          else
            # repository_dispatch: the event type is release-<chart>
            CHART="${EVENT_ACTION#release-}"
          fi
          case "$CHART" in
            shoehorn|shoehorn-k8s-agent) ;;
            *) echo "Unknown chart: '$CHART'" >&2; exit 1 ;;
          esac
          echo "name=$CHART" >> "$GITHUB_OUTPUT"
          echo "tag_prefix=${CHART}-v" >> "$GITHUB_OUTPUT"
          echo "Chart: $CHART"

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          PAYLOAD_VERSION: ${{ github.event.client_payload.version }}
          CHART: ${{ steps.chart.outputs.name }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
            echo "Using version override: $VERSION"
          elif [ -n "$PAYLOAD_VERSION" ]; then
            VERSION="$PAYLOAD_VERSION"
            echo "Using version from repository_dispatch payload: $VERSION"
          elif [ "$CHART" = "shoehorn" ]; then
            VERSION=$(gh api repos/shoehorn-dev/shoehorn-platform/contents/version.json \
              --jq '.content' | base64 -d | jq -r '.version')
            echo "Resolved shoehorn version from shoehorn-platform: $VERSION"
          elif [ "$CHART" = "shoehorn-k8s-agent" ]; then
            VERSION=$(git ls-remote --tags --sort=-v:refname \
              https://github.com/shoehorn-dev/shoehorn-k8s-agents \
              | grep -oE 'refs/tags/v?[0-9]+\.[0-9]+\.[0-9]+$' \
              | head -1 | sed -E 's#refs/tags/v?##')
            echo "Resolved shoehorn-k8s-agent version from shoehorn-k8s-agents tags: $VERSION"
          else
            echo "Cannot resolve version for chart: $CHART" >&2
            exit 1
          fi

          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Could not resolve a version for $CHART" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=${CHART}-v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Generate changelog from commits
        id: changelog
        env:
          CURRENT_TAG: ${{ steps.version.outputs.tag }}
          TAG_PREFIX: ${{ steps.chart.outputs.tag_prefix }}
          CHART: ${{ steps.chart.outputs.name }}
        run: |
          PREV_TAG=$(git tag --list "${TAG_PREFIX}*" --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found -- using all commits for ${CHART}/"
            RANGE="HEAD"
          else
            echo "Generating changelog: ${PREV_TAG}..${CURRENT_TAG}"
            RANGE="${PREV_TAG}..HEAD"
          fi

          # Generate changelog from conventional commits scoped to this chart's directory
          # Categories: added, changed, fixed, security, deprecated, removed
          CHANGELOG=""
          ARTIFACTHUB_CHANGES=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            SUBJECT=$(echo "$line" | sed 's/^[a-f0-9]* //')

            # Classify by conventional commit prefix
            if echo "$SUBJECT" | grep -qiE '^feat(\(|:|\!)'; then
              KIND="added"
              DESC=$(echo "$SUBJECT" | sed -E 's/^feat(\([^)]*\))?[!]?:\s*//')
            elif echo "$SUBJECT" | grep -qiE '^fix(\(|:|\!)'; then
              KIND="fixed"
              DESC=$(echo "$SUBJECT" | sed -E 's/^fix(\([^)]*\))?[!]?:\s*//')
            elif echo "$SUBJECT" | grep -qiE '^security(\(|:|\!)'; then
              KIND="security"
              DESC=$(echo "$SUBJECT" | sed -E 's/^security(\([^)]*\))?[!]?:\s*//')
            elif echo "$SUBJECT" | grep -qiE '^deprecat'; then
              KIND="deprecated"
              DESC=$(echo "$SUBJECT" | sed -E 's/^deprecated?(\([^)]*\))?[!]?:\s*//')
            elif echo "$SUBJECT" | grep -qiE '^(refactor|perf|chore|docs|style|ci|build|test)(\(|:|\!)'; then
              KIND="changed"
              DESC=$(echo "$SUBJECT" | sed -E 's/^[a-z]+(\([^)]*\))?[!]?:\s*//')
            else
              KIND="changed"
              DESC="$SUBJECT"
            fi

            CHANGELOG="${CHANGELOG}- **${KIND}**: ${DESC}"$'\n'

            # Quote description: commit subjects contain YAML-significant chars that break ArtifactHub.
            ESCAPED_DESC=$(printf '%s' "$DESC" | sed -e 's/\\/\\\\/g' -e 's/"/\\"/g')
            ARTIFACTHUB_CHANGES="${ARTIFACTHUB_CHANGES}    - kind: ${KIND}"$'\n'"      description: \"${ESCAPED_DESC}\""$'\n'

          done < <(git log --oneline --no-merges ${RANGE} -- "${CHART}/")

          # Fallback if no chart-scoped commits found
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- **changed**: Release ${CURRENT_TAG}"$'\n'
            ARTIFACTHUB_CHANGES="    - kind: changed"$'\n'"      description: \"Release ${CURRENT_TAG}\""$'\n'
          fi

          # Write outputs
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "$CHANGELOG"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

          AH_CHANGES_FILE="${RUNNER_TEMP}/artifacthub_changes.yaml"
          printf '%s' "$ARTIFACTHUB_CHANGES" > "$AH_CHANGES_FILE"
          echo "ah_changes_file=$AH_CHANGES_FILE" >> $GITHUB_OUTPUT

          echo "prev_tag=${PREV_TAG:-initial}" >> $GITHUB_OUTPUT

      - name: Update Chart.yaml version and changelog
        env:
          CHART_NAME: ${{ steps.chart.outputs.name }}
          VERSION: ${{ steps.version.outputs.version }}
          AH_CHANGES_FILE: ${{ steps.changelog.outputs.ah_changes_file }}
        run: |
          CHART_FILE="${CHART_NAME}/Chart.yaml"

          sed -i "s/^version:.*/version: ${VERSION}/" "$CHART_FILE"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" "$CHART_FILE"

          echo "Chart version: ${VERSION}"
          echo "App version:   ${VERSION}"

          python3 - "$CHART_FILE" "$AH_CHANGES_FILE" <<'PYEOF'
          import sys, re

          chart_file = sys.argv[1]
          with open(sys.argv[2]) as f:
              new_changes = f.read()

          with open(chart_file, 'r') as f:
              content = f.read()

          # Consume the whole YAML literal block (any line indented >=4 spaces).
          pattern = r'(  artifacthub\.io/changes: \|)\n(?:    .*\n)+'
          replacement = f'  artifacthub.io/changes: |\n{new_changes}'

          new_content = re.sub(pattern, replacement, content)

          with open(chart_file, 'w') as f:
              f.write(new_content)
          PYEOF

      - name: Build chart dependencies
        run: |
          helm dependency build ${{ steps.chart.outputs.name }}

      - name: Package Helm chart
        run: |
          helm package ${{ steps.chart.outputs.name }}

      - name: Log in to Container Registry for Helm
        run: |
          echo "${{ secrets.PACKAGES }}" | helm registry login ${{ env.REGISTRY }} --username "${{ github.actor }}" --password-stdin

      - name: Log in to Container Registry for cosign + oras
        run: |
          echo "${{ secrets.PACKAGES }}" | docker login ${{ env.REGISTRY }} --username "${{ github.actor }}" --password-stdin

      - name: Push Helm chart to OCI registry
        id: helm-push
        env:
          CHART: ${{ steps.chart.outputs.name }}
        run: |
          PUSH_OUT=$(helm push ${CHART}-*.tgz oci://${{ env.REGISTRY }}/${{ github.repository }} 2>&1 | tee /dev/stderr)
          DIGEST=$(echo "$PUSH_OUT" | awk '/^Digest: /{print $2}')
          if [ -z "$DIGEST" ]; then
            echo "Failed to parse digest from helm push output" >&2
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Sign chart with cosign (keyless OIDC)
        env:
          CHART: ${{ steps.chart.outputs.name }}
          DIGEST: ${{ steps.helm-push.outputs.digest }}
          COSIGN_YES: "true"
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ github.repository }}/${CHART}@${DIGEST}"

      - name: Publish artifacthub-repo.yml as OCI artifact
        env:
          CHART: ${{ steps.chart.outputs.name }}
        run: |
          cd "${CHART}"
          oras push \
            "${{ env.REGISTRY }}/${{ github.repository }}/${CHART}:artifacthub.io" \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml

      - name: Create GitHub Release with changelog
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CURRENT_TAG: ${{ steps.version.outputs.tag }}
          PREV_TAG: ${{ steps.changelog.outputs.prev_tag }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
          CHART_NAME: ${{ steps.chart.outputs.name }}
          CHART_VERSION: ${{ steps.version.outputs.version }}
        run: |
          BODY="## Changelog"$'\n\n'

          if [ "$PREV_TAG" != "initial" ]; then
            BODY+="Changes since \`${PREV_TAG}\`:"$'\n\n'
          else
            BODY+="Initial release:"$'\n\n'
          fi

          BODY+="${CHANGELOG}"
          BODY+=$'\n'"## Installation"$'\n\n'
          BODY+='```bash'$'\n'
          BODY+="helm install ${CHART_NAME} oci://ghcr.io/shoehorn-dev/helm-charts/${CHART_NAME} --version ${CHART_VERSION}"$'\n'
          BODY+='```'$'\n\n'
          BODY+="## Upgrade"$'\n\n'
          BODY+='```bash'$'\n'
          BODY+="helm upgrade ${CHART_NAME} oci://ghcr.io/shoehorn-dev/helm-charts/${CHART_NAME} --version ${CHART_VERSION}"$'\n'
          BODY+='```'$'\n'

          # Creates the tag at the checked-out commit. No standalone tag push
          # exists, so this cannot re-trigger the workflow.
          gh release create "$CURRENT_TAG" \
            --target "$GITHUB_SHA" \
            ${CHART_NAME}-*.tgz \
            --title "${CHART_NAME} ${CHART_VERSION}" \
            --notes "$BODY"
