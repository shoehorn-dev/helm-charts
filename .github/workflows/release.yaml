name: Release

on:
  push:
    tags:
      - 'shoehorn-v*'
      - 'shoehorn-k8s-agent-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. shoehorn-v0.3.0 or shoehorn-k8s-agent-v0.3.0)'
        required: true
        type: string
      app_version:
        description: 'Application version for appVersion in Chart.yaml (fetched from shoehorn-platform if empty)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  release-helm:
    name: Release Helm Chart
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pages: write
      id-token: write

    steps:
      - name: Generate release bot token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: shoehorn-dev
          repositories: helm-charts,shoehorn-platform

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Configure git as release bot
        run: |
          git config user.name "shoehorn-release[bot]"
          git config user.email "272929799+shoehorn-release[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: '4.1.1'

      - name: Add Helm repositories
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update

      - name: Determine tag
        id: resolve-tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          GIT_REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GIT_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag if workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ steps.resolve-tag.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Fetch application version
        id: app-version
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_APP_VERSION: ${{ inputs.app_version }}
        run: |
          if [ -n "$INPUT_APP_VERSION" ]; then
            echo "version=$INPUT_APP_VERSION" >> "$GITHUB_OUTPUT"
            echo "Using provided appVersion: $INPUT_APP_VERSION"
          else
            # Fetch version.json from shoehorn-platform main branch
            APP_VERSION=$(gh api repos/shoehorn-dev/shoehorn-platform/contents/version.json \
              --jq '.content' | base64 -d | jq -r '.version')
            echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
            echo "Fetched appVersion from shoehorn-platform: $APP_VERSION"
          fi

      - name: Determine chart name from tag
        id: chart
        env:
          TAG: ${{ steps.resolve-tag.outputs.tag }}
        run: |
          if [[ "$TAG" == shoehorn-k8s-agent-v* ]]; then
            echo "name=shoehorn-k8s-agent" >> $GITHUB_OUTPUT
            echo "version=${TAG#shoehorn-k8s-agent-v}" >> $GITHUB_OUTPUT
            echo "tag_prefix=shoehorn-k8s-agent-v" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == shoehorn-v* ]]; then
            echo "name=shoehorn" >> $GITHUB_OUTPUT
            echo "version=${TAG#shoehorn-v}" >> $GITHUB_OUTPUT
            echo "tag_prefix=shoehorn-v" >> $GITHUB_OUTPUT
          else
            echo "Unknown tag format: $TAG"
            exit 1
          fi

      - name: Generate changelog from commits
        id: changelog
        env:
          CURRENT_TAG: ${{ steps.resolve-tag.outputs.tag }}
          TAG_PREFIX: ${{ steps.chart.outputs.tag_prefix }}
          CHART: ${{ steps.chart.outputs.name }}
        run: |
          PREV_TAG=$(git tag --list "${TAG_PREFIX}*" --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found -- using all commits for ${CHART}/"
            RANGE="HEAD"
          else
            echo "Generating changelog: ${PREV_TAG}..${CURRENT_TAG}"
            RANGE="${PREV_TAG}..HEAD"
          fi

          # Generate changelog from conventional commits scoped to this chart's directory
          # Categories: added, changed, fixed, security, deprecated, removed
          CHANGELOG=""
          ARTIFACTHUB_CHANGES=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            SUBJECT=$(echo "$line" | sed 's/^[a-f0-9]* //')

            # Classify by conventional commit prefix
            if echo "$SUBJECT" | grep -qiE '^feat(\(|:|\!)'; then
              KIND="added"
              DESC=$(echo "$SUBJECT" | sed -E 's/^feat(\([^)]*\))?[!]?:\s*//')
            elif echo "$SUBJECT" | grep -qiE '^fix(\(|:|\!)'; then
              KIND="fixed"
              DESC=$(echo "$SUBJECT" | sed -E 's/^fix(\([^)]*\))?[!]?:\s*//')
            elif echo "$SUBJECT" | grep -qiE '^security(\(|:|\!)'; then
              KIND="security"
              DESC=$(echo "$SUBJECT" | sed -E 's/^security(\([^)]*\))?[!]?:\s*//')
            elif echo "$SUBJECT" | grep -qiE '^deprecat'; then
              KIND="deprecated"
              DESC=$(echo "$SUBJECT" | sed -E 's/^deprecated?(\([^)]*\))?[!]?:\s*//')
            elif echo "$SUBJECT" | grep -qiE '^(refactor|perf|chore|docs|style|ci|build|test)(\(|:|\!)'; then
              KIND="changed"
              DESC=$(echo "$SUBJECT" | sed -E 's/^[a-z]+(\([^)]*\))?[!]?:\s*//')
            else
              KIND="changed"
              DESC="$SUBJECT"
            fi

            # Build markdown changelog
            CHANGELOG="${CHANGELOG}- **${KIND}**: ${DESC}"$'\n'

            # Build ArtifactHub YAML annotation (one entry per commit)
            ARTIFACTHUB_CHANGES="${ARTIFACTHUB_CHANGES}    - kind: ${KIND}"$'\n'"      description: ${DESC}"$'\n'

          done < <(git log --oneline --no-merges ${RANGE} -- "${CHART}/")

          # Fallback if no chart-scoped commits found
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- **changed**: Release ${CURRENT_TAG}"$'\n'
            ARTIFACTHUB_CHANGES="    - kind: changed"$'\n'"      description: Release ${CURRENT_TAG}"$'\n'
          fi

          # Write outputs
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "$CHANGELOG"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

          {
            echo "artifacthub_changes<<AHCHANGES_EOF"
            echo "$ARTIFACTHUB_CHANGES"
            echo "AHCHANGES_EOF"
          } >> $GITHUB_OUTPUT

          echo "prev_tag=${PREV_TAG:-initial}" >> $GITHUB_OUTPUT

      - name: Update Chart.yaml version and changelog
        env:
          APP_VERSION: ${{ steps.app-version.outputs.version }}
        run: |
          CHART_FILE="${{ steps.chart.outputs.name }}/Chart.yaml"

          # Update chart version (from tag) and appVersion (from shoehorn-platform)
          sed -i "s/^version:.*/version: ${{ steps.chart.outputs.version }}/" "$CHART_FILE"
          sed -i "s/^appVersion:.*/appVersion: \"${APP_VERSION}\"/" "$CHART_FILE"

          echo "Chart version: ${{ steps.chart.outputs.version }}"
          echo "App version:   ${APP_VERSION}"

          # Replace the artifacthub.io/changes annotation block
          # Remove existing changes block (from the annotation line to the next annotation or end of annotations)
          python3 - "$CHART_FILE" "${{ steps.changelog.outputs.artifacthub_changes }}" <<'PYEOF'
          import sys, re

          chart_file = sys.argv[1]
          new_changes = sys.argv[2]

          with open(chart_file, 'r') as f:
              content = f.read()

          # Replace the artifacthub.io/changes block
          # Match from "artifacthub.io/changes: |" to the next annotation or end of annotations section
          pattern = r'(  artifacthub\.io/changes: \|)\n(    - .*\n)*'
          replacement = f'  artifacthub.io/changes: |\n{new_changes}'

          new_content = re.sub(pattern, replacement, content)

          with open(chart_file, 'w') as f:
              f.write(new_content)
          PYEOF

      - name: Build chart dependencies
        run: |
          helm dependency build ${{ steps.chart.outputs.name }}

      - name: Package Helm chart
        run: |
          helm package ${{ steps.chart.outputs.name }}

      - name: Log in to Container Registry for Helm
        run: |
          echo "${{ steps.app-token.outputs.token }}" | helm registry login ${{ env.REGISTRY }} --username shoehorn-release[bot] --password-stdin

      - name: Push Helm chart to OCI registry
        run: |
          helm push ${{ steps.chart.outputs.name }}-*.tgz oci://${{ env.REGISTRY }}/${{ github.repository }}

      - name: Create GitHub Release with changelog
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CURRENT_TAG: ${{ steps.resolve-tag.outputs.tag }}
          PREV_TAG: ${{ steps.changelog.outputs.prev_tag }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
          CHART_NAME: ${{ steps.chart.outputs.name }}
          CHART_VERSION: ${{ steps.chart.outputs.version }}
        run: |
          BODY="## Changelog"$'\n\n'

          if [ "$PREV_TAG" != "initial" ]; then
            BODY+="Changes since \`${PREV_TAG}\`:"$'\n\n'
          else
            BODY+="Initial release:"$'\n\n'
          fi

          BODY+="${CHANGELOG}"
          BODY+=$'\n'"## Installation"$'\n\n'
          BODY+='```bash'$'\n'
          BODY+="helm install shoehorn oci://ghcr.io/shoehorn-dev/helm-charts/${CHART_NAME} --version ${CHART_VERSION}"$'\n'
          BODY+='```'$'\n\n'
          BODY+="## Upgrade"$'\n\n'
          BODY+='```bash'$'\n'
          BODY+="helm upgrade shoehorn oci://ghcr.io/shoehorn-dev/helm-charts/${CHART_NAME} --version ${CHART_VERSION}"$'\n'
          BODY+='```'$'\n'

          gh release create "$CURRENT_TAG" \
            ${CHART_NAME}-*.tgz \
            --title "${CHART_NAME} ${CHART_VERSION}" \
            --notes "$BODY"

      - name: Build GitHub Pages artifact
        env:
          CHART_NAME: ${{ steps.chart.outputs.name }}
          CHART_VERSION: ${{ steps.chart.outputs.version }}
          PAGES_URL: https://charts.shoehorn.dev
        run: |
          PACKAGE_FILE="${CHART_NAME}-${CHART_VERSION}.tgz"
          PAGES_DIR="$RUNNER_TEMP/pages-site"
          mkdir -p "$PAGES_DIR"

          if curl -fsSL "$PAGES_URL/index.yaml" -o "$PAGES_DIR/previous-index.yaml"; then
            echo "Fetched existing Pages index"
          else
            echo "No existing Pages index found"
          fi

          cp "$PACKAGE_FILE" "$PAGES_DIR/"
          cat > "$PAGES_DIR/index.html" <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Shoehorn Helm Charts</title>
            <style>
              :root {
                color-scheme: light;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: #f5f7fb;
                color: #10213a;
              }
              body {
                margin: 0;
                padding: 3rem 1.5rem;
              }
              main {
                max-width: 48rem;
                margin: 0 auto;
                background: #ffffff;
                border: 1px solid #d9e2f0;
                border-radius: 16px;
                padding: 2rem;
                box-shadow: 0 20px 60px rgba(16, 33, 58, 0.08);
              }
              code {
                background: #eef3fb;
                padding: 0.2rem 0.4rem;
                border-radius: 6px;
              }
              pre {
                background: #10213a;
                color: #f5f7fb;
                padding: 1rem;
                border-radius: 12px;
                overflow-x: auto;
              }
              a {
                color: #0057d8;
              }
            </style>
          </head>
          <body>
            <main>
              <h1>Shoehorn Helm Charts</h1>
              <p>This repository is served from GitHub Pages for classic Helm repository support.</p>
              <p>Repository URL: <a href="https://charts.shoehorn.dev">https://charts.shoehorn.dev</a></p>
              <pre><code>helm repo add shoehorn https://charts.shoehorn.dev&#10;helm repo update&#10;helm search repo shoehorn</code></pre>
              <p>The canonical OCI packages remain available at <code>ghcr.io/shoehorn-dev/helm-charts</code>.</p>
            </main>
          </body>
          </html>
          EOF
          touch "$PAGES_DIR/.nojekyll"

          if [ -f "$PAGES_DIR/previous-index.yaml" ]; then
            helm repo index "$PAGES_DIR" --url "$PAGES_URL" --merge "$PAGES_DIR/previous-index.yaml"
          else
            helm repo index "$PAGES_DIR" --url "$PAGES_URL"
          fi

          rm -f "$PAGES_DIR/previous-index.yaml"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: ${{ runner.temp }}/pages-site

  deploy-pages:
    name: Deploy GitHub Pages
    needs: release-helm
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
