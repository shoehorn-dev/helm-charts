name: Release All Charts

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (default: read from version.json)'
        required: false
        type: string

jobs:
  tag:
    name: Tag both charts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate release bot token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v2
        with:
          client-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: shoehorn-dev
          repositories: helm-charts

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=$(jq -r '.version' version.json)
          fi
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Could not resolve version" >&2
            exit 1
          fi
          # Reject leading 'v' to keep tag format predictable
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tags via GitHub API (verified)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          COMMIT_SHA=$(git rev-parse HEAD)
          TAGGER_NAME="shoehorn-release[bot]"
          TAGGER_EMAIL="272929799+shoehorn-release[bot]@users.noreply.github.com"

          CHARTS=(shoehorn shoehorn-k8s-agent)
          for chart in "${CHARTS[@]}"; do
            TAG="${chart}-v${VERSION}"

            if gh api "repos/${REPO}/git/refs/tags/${TAG}" >/dev/null 2>&1; then
              echo "Tag $TAG already exists -- skipping"
              continue
            fi

            # Create the annotated tag object. GitHub signs this automatically
            # when called with a GitHub App installation token, so the tag shows
            # as Verified in the UI.
            TAG_SHA=$(gh api -X POST "repos/${REPO}/git/tags" \
              -f tag="$TAG" \
              -f message="Release $TAG" \
              -f object="$COMMIT_SHA" \
              -f type=commit \
              -f tagger[name]="$TAGGER_NAME" \
              -f tagger[email]="$TAGGER_EMAIL" \
              --jq '.sha')

            # Publish the tag ref so it appears in `git ls-remote --tags` and
            # triggers the per-chart release workflow.
            gh api -X POST "repos/${REPO}/git/refs" \
              -f ref="refs/tags/${TAG}" \
              -f sha="$TAG_SHA" >/dev/null

            echo "Created verified tag $TAG -> $COMMIT_SHA"
          done

      - name: Summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          {
            echo "## Released both charts at \`$VERSION\`"
            echo ""
            echo "Tags pushed (each triggers \`release.yaml\`):"
            echo "- \`shoehorn-v$VERSION\`"
            echo "- \`shoehorn-k8s-agent-v$VERSION\`"
          } >> "$GITHUB_STEP_SUMMARY"
